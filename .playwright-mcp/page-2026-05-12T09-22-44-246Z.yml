    - heading "spawn / mailbox code 例 (3 階層)" [level=3] [ref=e1147]
    - heading "L0 administrator → L1 phase-* (pilot) spawn" [level=4] [ref=e1148]
    - code [ref=e1150]: "# administrator main session が tmux で pilot を起動 (別 process) tmux new-window -n \"phase-impl-1684\" -- \\ bash -c \"cd /home/shuu5/projects/local-projects/twill/main && \\ claude code --skill phase-impl --arg issue_num=1684\""
    - heading "L1 phase-* (pilot) → L2 worker-* spawn" [level=4] [ref=e1151]
    - code [ref=e1153]: "# pilot main session が tmux で worker 群を並列起動 (各 worker も別 process) for file in src/foo.py src/bar.py; do tmux new-window -n \"worker-test-${file//\\//-}\" -- \\ bash -c \"cd /home/shuu5/projects/local-projects/twill/main && \\ claude code --skill worker-test-ready --arg file=$file --arg issue=1684\" done # worker は別 main session として独立、内部で optional に Agent subagent も使える # (例: worker-pr-verify が複数 file 用に並列 review subagent を spawn — 1 階層は OK)"
    - heading "L2 worker → L1 pilot mailbox write" [level=4] [ref=e1154]
    - code [ref=e1156]: "# worker が完了 report を pilot mailbox に write (file mailbox、flock atomic) MAILBOX=\"$REPO_ROOT/.mailbox/pilot-impl-1684/inbox.jsonl\" mkdir -p \"$(dirname \"$MAILBOX\")\" ( flock -x 200 jq -nc \\ --arg from \"worker-test-foo-py\" \\ --arg ts \"$(date -u +%FT%TZ)\" \\ --arg event \"test_scaffold_done\" \\ --argjson red_count 3 \\ '{from:$from, ts:$ts, event:$event, red_count:$red_count}' \\ >> \"$MAILBOX\" ) 200>\"$MAILBOX.lock\""
    - heading "L1 pilot → L0 administrator mailbox write (worker mail を集約後)" [level=4] [ref=e1157]
    - code [ref=e1159]: "# pilot が worker mail を集約後、administrator mailbox に要約 report を write ADMIN_MBOX=\"$REPO_ROOT/.mailbox/administrator/inbox.jsonl\" ( flock -x 200 jq -nc \\ --arg from \"pilot-impl-1684\" \\ --arg issue \"1684\" \\ --arg status \"Implementing\" \\ --argjson workers_done 2 \\ '{from:$from, issue:$issue, status:$status, workers_done:$workers_done}' \\ >> \"$ADMIN_MBOX\" ) 200>\"$ADMIN_MBOX.lock\" # pilot は GitHub Project Board status も更新 (SSoT) gh project item-edit --id \"$ITEM_ID\" --single-select-option-id \"$IMPLEMENTING_OPTION_ID\""
    - 'heading "L0 administrator: 自分の mailbox poll + 次 phase 判断" [level=4] [ref=e1160]'
    - code [ref=e1162]: "# administrator は CronCreate (25 min) で poll ADMIN_MBOX=\"$REPO_ROOT/.mailbox/administrator/inbox.jsonl\" # 未読 mail の処理 (line-based、processed line を別 file で track) while IFS= read -r msg; do issue=$(echo \"$msg\" | jq -r '.issue') status=$(echo \"$msg\" | jq -r '.status') case \"$status\" in Implementing) tmux new-window -n \"phase-pr-$issue\" -- ... ;; PR\\ Reviewed) echo \"branch protection が auto-merge する\" ;; esac done < <(tail -n +$((PROCESSED_LINE+1)) \"$ADMIN_MBOX\")"
