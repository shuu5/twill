    - heading "cycle 実装 (pseudo-bash)" [level=3] [ref=e326]
    - code [ref=e328]: "# administrator main session の polling cycle (CronCreate 25min 発火で実行) admin_polling_cycle() { # --- READ phase --- # 1. 自分の mailbox (pilot からの集約 report) を読む ADMIN_MBOX=\"$REPO_ROOT/.mailbox/administrator/inbox.jsonl\" PROCESSED_FILE=\"$REPO_ROOT/.mailbox/administrator/.processed\" last_line=$(cat \"$PROCESSED_FILE\" 2>/dev/null || echo 0) new_mails=$(tail -n +$((last_line + 1)) \"$ADMIN_MBOX\") total_lines=$(wc -l < \"$ADMIN_MBOX\") echo \"$total_lines\" > \"$PROCESSED_FILE\" # 2. GitHub Project Board の全 Issue Status を取得 current_statuses=$(gh project item-list 6 --owner shuu5 --format json | \\ jq -c '.items[] | {num: .content.number, status: .status, title: .content.title}') # 3. アクティブな tmux pilot / worker window を列挙 active_windows=$(tmux list-windows -F '#{window_name}' | grep -E '^(phase-|worker-)') # --- JUDGE + WRITE phase --- # 4. spawn 判断: status 遷移完了 + active 不在 → 次 phase spawn echo \"$current_statuses\" | while read -r item; do issue=$(echo \"$item\" | jq -r '.num') status=$(echo \"$item\" | jq -r '.status') # idempotent guard: 既に同 Issue の pilot が動いていれば skip if echo \"$active_windows\" | grep -q \"phase-.*-${issue}$\"; then continue fi # 次 phase 判定 case \"$status\" in Idea) next_phase=\"phase-explore\" ;; Explored) next_phase=\"phase-refine\" ;; Refined) next_phase=\"phase-impl\" ;; Implementing) next_phase=\"phase-pr\" ;; \"PR Reviewed\"|Merged) continue ;; # actions が処理 esac [ -z \"$next_phase\" ] && continue # 並列度上限 check (例: 同時 active pilot は 3 まで) active_pilot_count=$(echo \"$active_windows\" | grep -cE '^phase-') if [ \"$active_pilot_count\" -ge 3 ]; then echo \"[ADMIN] parallelism limit reached, defer issue=$issue\" >&2 continue fi # tmux spawn tmux new-window -n \"${next_phase}-${issue}\" -- \\ bash -c \"cd $REPO_ROOT && claude code --skill ${next_phase} --arg issue_num=${issue}\" echo \"[ADMIN] spawned ${next_phase}-${issue}\" >&2 done # 5. failure / escalate 処理 (mail 内に failure flag があれば user notify) echo \"$new_mails\" | jq -c 'select(.event == \"failure\" or .escalate == true)' | while read -r mail; do # AskUserQuestion or Discord 通知 (memory にある reference_discord_dm.md 参照) issue=$(echo \"$mail\" | jq -r '.issue') reason=$(echo \"$mail\" | jq -r '.reason') echo \"[ADMIN] ESCALATE: issue=$issue reason=$reason\" >&2 # → ここで user notify (本 architecture では AskUserQuestion or Discord DM) done # 6. cleanup (完了済 pilot window を close + mailbox archive) echo \"$active_windows\" | while read -r win; do # status が終端 (PR Reviewed or Merged) の Issue の pilot は close issue=$(echo \"$win\" | grep -oE '[0-9]+$') [ -z \"$issue\" ] && continue status_of_issue=$(echo \"$current_statuses\" | jq -r --arg n \"$issue\" '. | select(.num == ($n | tonumber)) | .status') case \"$status_of_issue\" in \"PR Reviewed\"|Merged) tmux kill-window -t \"$win\" ;; esac done # 古い mailbox を archive (7 日経過したものを .mailbox/archive/ に移動) find \"$REPO_ROOT/.mailbox\" -maxdepth 2 -name \"inbox.jsonl\" -mtime +7 \\ -exec mv {} \"$REPO_ROOT/.mailbox/archive/\" \\; }"
