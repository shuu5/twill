    - code [ref=e1401]: "# administrator main session が tmux で pilot を起動 (別 process) tmux new-window -n \"phase-impl-1684\" -- \\ bash -c \"cd /home/shuu5/projects/local-projects/twill/main && \\ claude code --skill phase-impl --arg issue_num=1684\""
    - heading "L1 phase-* (pilot) → L2 worker-* spawn" [level=4] [ref=e1402]
    - code [ref=e1404]: "# pilot main session が tmux で worker 群を並列起動 (各 worker も別 process) for file in src/foo.py src/bar.py; do tmux new-window -n \"worker-test-${file//\\//-}\" -- \\ bash -c \"cd /home/shuu5/projects/local-projects/twill/main && \\ claude code --skill worker-test-ready --arg file=$file --arg issue=1684\" done # worker は別 main session として独立、内部で optional に Agent subagent も使える # (例: worker-pr-verify が複数 file 用に並列 review subagent を spawn — 1 階層は OK)"
    - heading "L2 worker → L1 pilot mailbox write" [level=4] [ref=e1405]
    - code [ref=e1407]: "# worker が完了 report を pilot mailbox に write (file mailbox、flock atomic) MAILBOX=\"$REPO_ROOT/.mailbox/pilot-impl-1684/inbox.jsonl\" mkdir -p \"$(dirname \"$MAILBOX\")\" ( flock -x 200 jq -nc \\ --arg from \"worker-test-foo-py\" \\ --arg ts \"$(date -u +%FT%TZ)\" \\ --arg event \"test_scaffold_done\" \\ --argjson red_count 3 \\ '{from:$from, ts:$ts, event:$event, red_count:$red_count}' \\ >> \"$MAILBOX\" ) 200>\"$MAILBOX.lock\""
