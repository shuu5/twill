      - text: "共通 framework:"
      - code [ref=e541]: plugins/twl/scripts/step.sh
      - text: (pseudo)
    - code [ref=e543]: "# worker SKILL.md は以下のように 1 行で step を呼ぶだけ # step_run test-scaffold issue=$ISSUE file=$FILE # step_run green-impl issue=$ISSUE file=$FILE # step_run check issue=$ISSUE set -euo pipefail # 各 step の verification rule (case で dispatch) step_run() { local step_name=\"$1\"; shift local args=(\"$@\") # parse key=value pairs declare -A opts for arg in \"${args[@]}\"; do opts[\"${arg%%=*}\"]=\"${arg#*=}\"; done echo \"[step.sh] ===== step=$step_name BEGIN =====\" >&2 # 1. pre-check (state snapshot) local pre_snapshot=$(_step_pre_check \"$step_name\" opts) || _step_fail \"$step_name\" pre \"$pre_snapshot\" echo \"[step.sh] pre: $pre_snapshot\" >&2 # 2. exec (LLM は呼び出し元の skill 内で実行済み、step.sh は LLM 作業の verify のみ) # exec 自体は LLM が skill 内で行う = step.sh の責務外 # (step_run は post-verify と report のみを請け負う) # 3. post-verify (step 固有の rule) local verify_result=$(_step_post_verify \"$step_name\" \"$pre_snapshot\" opts) || \\ _step_fail \"$step_name\" post \"$verify_result\" echo \"[step.sh] post: $verify_result\" >&2 # 4. report (pilot mailbox に成功 mail を書く) _step_report \"$step_name\" success \"$verify_result\" opts echo \"[step.sh] ===== step=$step_name OK =====\" >&2 } # step 固有 rule の dispatch _step_post_verify() { local step=\"$1\"; local pre=\"$2\"; local -n opts_ref=\"$3\" case \"$step\" in test-scaffold) _verify_red_test_added \"$pre\" \"${opts_ref[file]}\" ;; green-impl) _verify_src_changed_and_green \"$pre\" \"${opts_ref[file]}\" ;; check) _verify_lint_typecheck \"${opts_ref[file]}\" ;; pr-test) _verify_pr_test_pass \"${opts_ref[issue]}\" ;; ac-verify) _verify_ac_checkbox_flip \"${opts_ref[issue]}\" ;; phase-review) _verify_agent_return_value \"${opts_ref[issue]}\" ;; *) echo \"ERROR: unknown step=$step\" >&2 return 1 ;; esac } # 個別 verification 関数 (rule per step) _verify_red_test_added() { local pre=\"$1\"; local file=\"$2\" local pre_count=$(echo \"$pre\" | jq -r '.test_count') local post_count=$(pytest --collect-only -q 2>&1 | tail -1 | awk '{print $1}') [ \"$post_count\" -gt \"$pre_count\" ] || { echo \"no new test\"; return 1; } pytest -x --tb=no -q 2>&1 | tail -1 | grep -qv \"passed\" || { echo \"test not RED\"; return 1; } echo \"{\\\"red_count\\\": $((post_count - pre_count))}\" } _verify_src_changed_and_green() { local pre=\"$1\"; local file=\"$2\" [ \"$(git diff --stat src/ | wc -l)\" -gt 0 ] || { echo \"no src/ change\"; return 1; } pytest -x --tb=short 2>&1 >/dev/null || { echo \"test still RED\"; return 1; } echo \"{\\\"green\\\": true}\" } # pilot mailbox に書き込み _step_report() { local step=\"$1\"; local status=\"$2\"; local detail=\"$3\" local pilot_mbox=\"$REPO_ROOT/.mailbox/${PILOT_NAME:-pilot-unknown}/inbox.jsonl\" ( flock -x 200 jq -nc \\ --arg from \"${WORKER_NAME:-worker-unknown}\" \\ --arg ts \"$(date -u +%FT%TZ)\" \\ --arg step \"$step\" \\ --arg status \"$status\" \\ --argjson detail \"$detail\" \\ '{from:$from, ts:$ts, step:$step, status:$status, detail:$detail}' \\ >> \"$pilot_mbox\" ) 200>\"$pilot_mbox.lock\" } # fail 時の処理 _step_fail() { local step=\"$1\"; local phase=\"$2\"; local reason=\"$3\" _step_report \"$step\" \"failure\" \"{\\\"phase\\\":\\\"$phase\\\",\\\"reason\\\":\\\"$reason\\\"}\" echo \"[step.sh] FAIL step=$step phase=$phase reason=$reason\" >&2 exit 1 }"
