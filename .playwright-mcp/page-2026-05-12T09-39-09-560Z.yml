    - 'heading "L0 administrator: 自分の mailbox poll + 次 phase 判断" [level=4] [ref=e1411]'
    - code [ref=e1413]: "# administrator は CronCreate (25 min) で poll ADMIN_MBOX=\"$REPO_ROOT/.mailbox/administrator/inbox.jsonl\" # 未読 mail の処理 (line-based、processed line を別 file で track) while IFS= read -r msg; do issue=$(echo \"$msg\" | jq -r '.issue') status=$(echo \"$msg\" | jq -r '.status') case \"$status\" in Implementing) tmux new-window -n \"phase-pr-$issue\" -- ... ;; PR\\ Reviewed) echo \"branch protection が auto-merge する\" ;; esac done < <(tail -n +$((PROCESSED_LINE+1)) \"$ADMIN_MBOX\")"
