change: fix-autopilotdir-worker-propagation
type: manual-verification
reason: >
  対象はMarkdownコマンドファイル内のbash疑似コード。
  実行可能スクリプトではないためUnit/Integrationテスト不可。
  検証はopenspec scenarioベースの手動確認で実施。

scenarios:
  - name: 単一リポジトリでの PILOT_AUTOPILOT_DIR 設定
    file: commands/autopilot-phase-execute.md
    verification: resolve_issue_repo_context() else分岐で PILOT_AUTOPILOT_DIR="${PROJECT_DIR}/.autopilot" を確認

  - name: クロスリポジトリでの PILOT_AUTOPILOT_DIR 設定は変更なし
    file: commands/autopilot-phase-execute.md
    verification: resolve_issue_repo_context() if分岐が既存動作を維持していることを確認

  - name: PILOT_AUTOPILOT_DIR 設定済みの場合
    file: commands/autopilot-launch.md
    verification: PILOT_AUTOPILOT_DIR非空時にAUTOPILOT_ENVが設定されることを確認

  - name: PILOT_AUTOPILOT_DIR 未設定の場合のフォールバック
    file: commands/autopilot-launch.md
    verification: PILOT_AUTOPILOT_DIR空時にフォールバックでAUTOPILOT_ENVが設定されることを確認

  - name: Worker が AUTOPILOT_DIR を受信する
    file: commands/autopilot-launch.md
    verification: tmux new-windowのenvプレフィックスにAUTOPILOT_DIRが含まれることを確認

  - name: Worker が IS_AUTOPILOT=true と判定する
    file: commands/autopilot-launch.md
    verification: AUTOPILOT_DIR環境変数がWorkerに伝搬され、state-read.shが正しいパスを参照することを確認
