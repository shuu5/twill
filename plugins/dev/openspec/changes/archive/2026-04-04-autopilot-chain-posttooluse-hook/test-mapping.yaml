# Test mapping: specs → test files
# Generated for change: autopilot-chain-posttooluse-hook

change: autopilot-chain-posttooluse-hook
tests:
  unit:
    file: tests/scenarios/post-skill-chain-nudge.test.sh
    coverage: edge-cases
    type: document-verification
    scenarios:
      # --- Requirement: PostToolUse hook スクリプトの作成 ---
      - id: "hook-worker-receives-next-step"
        name: "autopilot Worker が Skill tool 完了後に次ステップを受け取る"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "PostToolUse hook スクリプトの作成"
        test_name: "hook が [chain-continuation] メッセージを出力する"
        type: unit
        status: pending

      - id: "hook-non-autopilot-transparent"
        name: "非 autopilot セッションでは hook が透過的に動作する"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "PostToolUse hook スクリプトの作成"
        test_name: "AUTOPILOT_DIR 未設定時の exit 0 処理が存在する"
        type: unit
        status: pending

      - id: "hook-chain-done-silent"
        name: "chain が完了した Worker では hook が何も出力しない"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "PostToolUse hook スクリプトの作成"
        test_name: "hook が next-step=done の場合に何も出力しない"
        type: unit
        status: pending

      - id: "hook-error-continues-worker"
        name: "hook エラーが発生しても Worker が継続する"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "PostToolUse hook スクリプトの作成"
        test_name: "hook が常に exit 0 で終了する（Worker を停止しない）"
        type: unit
        status: pending

      - id: "hook-no-issue-number-exit"
        name: "ブランチから issue 番号が取得できない場合は exit 0"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "PostToolUse hook スクリプトの作成"
        test_name: "issue 番号取得失敗時の exit 0 処理が存在する"
        type: unit
        status: pending

      - id: "hook-timestamp-recorded"
        name: "hook 注入後にタイムスタンプが記録される"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "last_hook_nudge_at タイムスタンプ記録"
        test_name: "hook が last_hook_nudge_at を state-write.sh で記録する"
        type: unit
        status: pending

      # --- Requirement: orchestrator check_and_nudge の二重 nudge 防止 ---
      - id: "orchestrator-skips-within-30s"
        name: "hook 注入直後に orchestrator が nudge をスキップする"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "orchestrator check_and_nudge の二重 nudge 防止"
        test_name: "orchestrator が NUDGE_TIMEOUT 以内の二重 nudge をスキップする"
        type: unit
        status: pending

      - id: "orchestrator-nudges-after-30s"
        name: "hook 注入から 30s 以上経過した場合は orchestrator が nudge を送信する"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "orchestrator check_and_nudge の二重 nudge 防止"
        test_name: "orchestrator が last_hook_nudge_at からの経過時間を計算する"
        type: unit
        status: pending

      - id: "orchestrator-legacy-fallback"
        name: "last_hook_nudge_at フィールドが存在しない場合は従来動作"
        spec_file: "specs/post-skill-chain-nudge.md"
        requirement: "orchestrator check_and_nudge の二重 nudge 防止"
        test_name: "last_hook_nudge_at なし（旧状態）の場合のフォールバック処理が存在する"
        type: unit
        status: pending

  e2e:
    skip: true
    reason: "bash スクリプトのみの変更。E2E テスト対象なし"
