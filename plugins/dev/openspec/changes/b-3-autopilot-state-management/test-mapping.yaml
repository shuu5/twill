  - id: "invariant-a-state-uniqueness"
    name: "不変条件A: 状態の一意性"
    requirement: "issue-{N}.json の status は常に running, merge-ready, done, failed のいずれか1つ"
    test_strategy: "state-write.sh の遷移バリデーションで保証。全許可遷移と全不正遷移の網羅テスト"
    verified_by: ["state-write-status-transition-running-to-merge-ready", "state-write-invalid-transition-rejection", "transition-all-valid", "transition-done-terminal"]
    type: invariant
    status: deferred-to-c5

  - id: "invariant-b-worktree-pilot-only"
    name: "不変条件B: Worktree 削除 Pilot 専任"
    requirement: "Worker は worktree を作成するが削除しない。削除は常に Pilot が実行"
    test_strategy: "worktree-delete.sh の CWD ガードで保証。worktrees/ 配下からの呼び出し拒否テスト"
    verified_by: ["worktree-worker-delete-denied", "worktree-self-delete-denied"]
    type: invariant
    status: deferred-to-c5

  - id: "invariant-c-worker-no-merge"
    name: "不変条件C: Worker マージ禁止"
    requirement: "Worker は merge-ready を宣言するのみ。マージ判断・実行は Pilot が merge-gate 経由で行う"
    test_strategy: "state-write.sh のロールベースアクセス制御で保証。Worker が status=done への遷移を試みた場合の拒否テスト"
    verified_by: ["role-pilot-issue-status-done"]
    type: invariant
    status: deferred-to-c5

  - id: "invariant-d-fail-skip-propagation"
    name: "不変条件D: 依存先 fail 時の skip 伝播"
    requirement: "Phase N で fail した Issue に依存する Phase N+1 以降の全 Issue は自動 skip"
    test_strategy: "co-autopilot の Phase ループロジックで保証。plan.yaml の依存グラフと fail 状態の組み合わせテスト"
    verified_by: []
    type: invariant
    status: deferred-to-c5

  - id: "invariant-e-retry-limit"
    name: "不変条件E: merge-gate リトライ制限"
    requirement: "merge-gate リジェクト後のリトライは最大1回。2回目リジェクト = 確定失敗"
    test_strategy: "state-write.sh の retry_count 検証で保証。retry_count >= 1 での failed→running 拒否テスト"
    verified_by: ["state-write-retry-count-exceeded"]
    type: invariant
    status: deferred-to-c5

  - id: "invariant-f-no-auto-rebase"
    name: "不変条件F: merge 失敗時 rebase 禁止"
    requirement: "squash merge 失敗時は停止のみ。自動 rebase は行わない"
    test_strategy: "merge-gate ロジック（B-5）で保証。merge 失敗時に rebase コマンドが呼ばれないことのテスト"
    verified_by: []
    type: invariant
    status: deferred-to-c5

  - id: "invariant-g-crash-detection"
    name: "不変条件G: クラッシュ検知保証"
    requirement: "Worker の crash/timeout は必ず検知され、issue-{N}.json の status が failed に遷移する"
    test_strategy: "crash-detect.sh で保証。tmux ペイン消失時の failed 遷移テスト"
    verified_by: ["crash-tmux-pane-lost", "crash-normal-exit-distinction"]
    type: invariant
    status: deferred-to-c5

  - id: "invariant-h-depsyaml-exclusivity"
    name: "不変条件H: deps.yaml 変更排他性"
