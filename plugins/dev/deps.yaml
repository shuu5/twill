    calls:
      - script: state-read
      - script: state-write
      - script: session:session-state
    description: "Worker crash 検知（session-state.sh 5状態検出 + tmux フォールバック）"

  health-check:
    type: script
    path: scripts/health-check.sh
    calls:
      - script: state-read
      - script: session:session-state
    description: "Worker 論理的異常検知（chain停止・エラー出力・input-waiting長時間）+ health-report 生成"

  tech-stack-detect:
    type: script
    path: scripts/tech-stack-detect.sh
    description: "変更ファイルから tech-stack を判定し conditional specialist を返す"

  specialist-output-parse:
    type: script
    path: scripts/specialist-output-parse.sh
    description: "specialist 出力の共通スキーマパース（status + findings）"

