    spawnable_by: [controller]
    can_spawn: []
    description: "contexts/ + phases/ → Issue候補リスト分解 + 整合性チェック"

  architect-group-refine:
    type: atomic
    path: commands/architect-group-refine/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "スケルトンIssueグループの一括精緻化"

  architect-issue-create:
