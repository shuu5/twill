    path: scripts/merge-gate-init.sh
    description: "merge-gate 初期化（状態読み取り + PR差分取得 + GATE_TYPE判定）"

  merge-gate-execute: # standalone: merge-gate helper script（merge-gate.md がインライン実装）
    type: script
    path: scripts/merge-gate-execute.sh
    description: "merge-gate マージ実行 / リジェクト（state-write.sh 統合）"

  merge-gate-issues: # standalone: merge-gate helper script（merge-gate.md がインライン実装）
    type: script
    path: scripts/merge-gate-issues.sh
    description: "tech-debt / self-improve Issue 自動起票"

  worktree-create:
    type: script
    path: scripts/worktree-create.sh
    description: "bare repo 向け worktree 作成（Issue番号→ブランチ名生成）"

  branch-create: # standalone: 通常 repo 向け（worktree モードでは worktree-create を使用）
    type: script
    path: scripts/branch-create.sh
    description: "通常 repo 向けフィーチャーブランチ作成"

  project-create:
    type: script
    path: scripts/project-create.sh
    description: "プロジェクト新規作成（タイプ別テンプレート対応）"

  project-migrate:
    type: script
    path: scripts/project-migrate.sh
    description: "既存プロジェクトの最新テンプレート移行"

  classify-failure: # standalone: pr-cycle helper script（fix-phase.md から未呼出）
    type: script
    path: scripts/classify-failure.sh
    description: "PR cycle 障害原因を harness / code / unknown に分類"

  parse-issue-ac:
    type: script
    path: scripts/parse-issue-ac.sh
    description: "Issue body + コメントから受け入れ基準（AC）抽出"

  session-audit:
    type: script
    path: scripts/session-audit.sh
    description: "セッション JSONL から監査サマリー抽出"

