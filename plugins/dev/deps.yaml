# loom-plugin-dev 依存関係定義
# version: 3.0
# plugin: dev

version: "3.0"
plugin: dev

entry_points:
  - skills/co-autopilot/SKILL.md
  - skills/co-issue/SKILL.md
  - skills/co-project/SKILL.md
  - skills/co-architect/SKILL.md

# チェーン（B-4 で追加、B-5 で pr-cycle 追加）
chains:
  setup:
    type: "A"
    description: "開発準備ワークフロー（worktree作成 → OpenSpec → テスト準備）"
    steps:
      - init
      - worktree-create
      - project-board-status-update
      - crg-auto-build
      - opsx-propose
      - ac-extract

  pr-cycle:
    type: "B"
    description: "PRサイクル（verify → review → test → fix → visual → report → merge）"
    steps:
      - ts-preflight
      - phase-review
      - scope-judge
      - pr-test
      - fix-phase
      - post-fix-verify
      - warning-fix
      - e2e-screening
      - pr-cycle-report
      - all-pass-check
      - merge-gate

# スキル（controller x4 + workflow x2）
skills:
  co-autopilot:
    type: controller
    path: skills/co-autopilot/SKILL.md
    spawnable_by: [user]
    can_spawn: [composite, atomic, specialist]
    description: "依存グラフに基づくIssue群一括自律実装オーケストレーター"

  co-issue:
    type: controller
    path: skills/co-issue/SKILL.md
    spawnable_by: [user]
    can_spawn: [composite, atomic, reference]
    description: "要望をGitHub Issueに変換するワークフロー"

  co-project:
    type: controller
    path: skills/co-project/SKILL.md
    spawnable_by: [user]
    can_spawn: [atomic]
    description: "プロジェクト管理（create / migrate / snapshot）"

  co-architect:
    type: controller
    path: skills/co-architect/SKILL.md
    spawnable_by: [user]
    can_spawn: [atomic, reference]
    description: "対話的アーキテクチャ構築ワークフロー"

  workflow-setup:
    type: workflow
    path: skills/workflow-setup/SKILL.md
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: init
        step: "1"
      - atomic: worktree-create
        step: "2"
      - atomic: project-board-status-update
        step: "2.3"
      - atomic: crg-auto-build
        step: "2.4"
      - atomic: opsx-propose
        step: "3"
      - atomic: ac-extract
        step: "3.5"
    description: "開発準備ワークフロー（chain-driven）"

  workflow-test-ready:
    type: workflow
    path: skills/workflow-test-ready/SKILL.md
    spawnable_by: [controller]
    can_spawn: [atomic]
    description: "テスト生成と準備確認ワークフロー"

  workflow-pr-cycle:
    type: workflow
    path: skills/workflow-pr-cycle/SKILL.md
    spawnable_by: [controller]
    can_spawn: [composite, atomic]
    calls:
      - atomic: ts-preflight
        step: "1"
      - composite: phase-review
        step: "2"
      - atomic: scope-judge
        step: "2.5"
      - atomic: pr-test
        step: "3"
      - composite: fix-phase
        step: "4"
      - atomic: post-fix-verify
        step: "4.5"
      - atomic: warning-fix
        step: "5"
      - composite: e2e-screening
        step: "6"
      - atomic: pr-cycle-report
        step: "7"
      - atomic: all-pass-check
        step: "7.5"
      - composite: merge-gate
        step: "8"
    description: "PRサイクルワークフロー（chain-driven）"


# リファレンス（B-6 で追加）
refs:
  ref-specialist-output-schema:
    type: reference
    path: refs/ref-specialist-output-schema.md
    description: "specialist 共通出力スキーマ定義"

  ref-specialist-few-shot:
    type: reference
    path: refs/ref-specialist-few-shot.md
    description: "specialist プロンプト用 few-shot テンプレート"

# コマンド（B-4 で拡充）
commands:
  self-improve-review:
    type: atomic
    path: commands/self-improve-review/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "セッション中のBashエラーをレビューし問題をIssue化候補として構造化"

  init:
    type: atomic
    path: commands/init/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "1"
    description: "開発状態判定"

  worktree-create:
    type: atomic
    path: commands/worktree-create/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2"
    description: "worktree 作成"

  worktree-list:
    type: atomic
    path: commands/worktree-list/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "worktree 一覧表示"

  project-board-status-update:
    type: atomic
    path: commands/project-board-status-update/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.3"
    description: "Project Board Status を In Progress に更新"

  crg-auto-build:
    type: atomic
    path: commands/crg-auto-build/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.4"
    description: "CRG グラフ自動ビルド"

  opsx-propose:
    type: atomic
    path: commands/opsx-propose/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3"
    description: "OpenSpec 提案ラッパー"

  opsx-apply:
    type: atomic
    path: commands/opsx-apply/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "OpenSpec 実装ラッパー"

  opsx-archive:
    type: atomic
    path: commands/opsx-archive/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "OpenSpec アーカイブ"

  ac-extract:
    type: atomic
    path: commands/ac-extract/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3.5"
    description: "AC（受け入れ基準）抽出"

  ts-preflight:
    type: atomic
    path: commands/ts-preflight/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "1"
    description: "TypeScript 機械的検証（型チェック・lint）"

  scope-judge:
    type: atomic
    path: commands/scope-judge/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "2.5"
    description: "スコープ判定 + Deferred Issue 作成"

  pr-test:
    type: atomic
    path: commands/pr-test/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "3"
    description: "テスト実行"

  post-fix-verify:
    type: atomic
    path: commands/post-fix-verify/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "4.5"
    description: "fix 後の軽量コードレビュー"

  warning-fix:
    type: atomic
    path: commands/warning-fix/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "5"
    description: "Warning ベストエフォート修正"

  pr-cycle-report:
    type: atomic
    path: commands/pr-cycle-report/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "7"
    description: "PRサイクル結果フォーマット・投稿"

  all-pass-check:
    type: atomic
    path: commands/all-pass-check/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "7.5"
    description: "全パス判定（autopilot-first）"

  ac-verify:
    type: atomic
    path: commands/ac-verify/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    description: "AC 検証（テスト結果と AC の照合）"

  phase-review:
    type: composite
    path: commands/phase-review/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: [specialist, script]
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "2"
    calls:
      - script: specialist-output-parse
      - script: tech-stack-detect
    description: "並列 specialist レビュー（動的レビュアー構築）"

  fix-phase:
    type: composite
    path: commands/fix-phase/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: [script]
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "4"
    description: "自動修正ループ + E2E 修復"

  e2e-screening:
    type: composite
    path: commands/e2e-screening/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: [script]
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "6"
    description: "Visual 検証（Screening + Heal）"

  merge-gate:
    type: composite
    path: commands/merge-gate/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: [specialist, script]
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "8"
    calls:
      - script: specialist-output-parse
      - script: tech-stack-detect
    description: "マージ判定（動的レビュー → severity フィルタ → PASS/REJECT）"

# スクリプト（B-3 で追加）
scripts:
  state-read:
    type: script
    path: scripts/state-read.sh
    description: "issue-{N}.json / session.json の読み取り"

  state-write:
    type: script
    path: scripts/state-write.sh
    description: "issue-{N}.json / session.json の書き込み（遷移バリデーション付き）"

  autopilot-init:
    type: script
    path: scripts/autopilot-init.sh
    description: ".autopilot/ ディレクトリ初期化とセッション排他制御"

  session-create:
    type: script
    path: scripts/session-create.sh
    description: "session.json の新規作成"

  session-archive:
    type: script
    path: scripts/session-archive.sh
    description: "セッション完了時のアーカイブ"

  session-add-warning:
    type: script
    path: scripts/session-add-warning.sh
    description: "cross-issue 警告の session.json 追記"

  worktree-delete:
    type: script
    path: scripts/worktree-delete.sh
    description: "worktree + ブランチ削除（Pilot 専任）"

  crash-detect:
    type: script
    path: scripts/crash-detect.sh
    description: "Worker crash 検知（tmux ペイン消失→failed 遷移）"

  tech-stack-detect:
    type: script
    path: scripts/tech-stack-detect.sh
    description: "変更ファイルから tech-stack を判定し conditional specialist を返す"

  specialist-output-parse:
    type: script
    path: scripts/specialist-output-parse.sh
    description: "specialist 出力の共通スキーマパース（status + findings）"

# エージェント（C-3 で追加）
agents: {}
