    spawnable_by: [controller]
    can_spawn: []
    description: "AI Tier 分類 + ユーザー確認テーブル表示"

  snapshot-generate:
    type: atomic
    path: commands/snapshot-generate/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "manifest.yaml + テンプレートファイル生成"

  # === C-2a: Architect系（5個） ===

  architect-completeness-check:
    type: atomic
    path: commands/architect-completeness-check/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "アーキテクチャ完全性チェック"

  architect-decompose:
    type: atomic
