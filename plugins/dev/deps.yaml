    spawnable_by: [controller]
    can_spawn: []
    description: "Issue作成後に Project V2 へ自動追加+フィールドミラー"

  issue-assess:
    type: composite
    path: commands/issue-assess/COMMAND.md
    spawnable_by: [controller]
    can_spawn: [specialist]
    description: "Issue品質評価（テンプレート準拠+コンテキストチェック並列）"

  # === C-2a: Project管理系（8個） ===

  project-create:
