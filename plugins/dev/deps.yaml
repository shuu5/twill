    path: commands/project-create/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "プロジェクト新規作成（bare repo + worktree + テンプレート + OpenSpec）"

  project-governance:
    type: atomic
    path: commands/project-governance/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "ガバナンス適用（Hooks + スキーマscaffold + CLAUDE.md拡張）"

  project-migrate:
    type: atomic
