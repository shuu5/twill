  ecc-monitor:
    type: atomic
    path: commands/ecc-monitor/COMMAND.md
    spawnable_by: [controller]
    can_spawn: []
    description: "ECC リポジトリの変更検知・関連性評価"

  # === C-2a: その他（1個） ===

  loom-validate:
    type: atomic
    path: commands/loom-validate/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "構造・型ルール検証（loom + plugin validate）"

  # === C-2b: Setup/Workflow-setup 系（5個） ===

  services:
    type: atomic
    path: commands/services/COMMAND.md
