# コマンド（B-4 で拡充）
commands:
  self-improve-review: # standalone: ユーザー直接起動
    type: atomic
    path: commands/self-improve-review.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "セッション中のBashエラーをレビューし問題をIssue化候補として構造化"

  init:
    type: atomic
    path: commands/init.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "1"
    description: "開発状態判定"

  worktree-create:
    type: atomic
    path: commands/worktree-create.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2"
    calls:
      - script: worktree-create
    description: "worktree 作成"

  worktree-list: # standalone: ユーザー直接起動
    type: atomic
    path: commands/worktree-list.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "worktree 一覧表示"

  project-board-status-update:
    type: atomic
    path: commands/project-board-status-update.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.3"
    description: "Project Board Status を In Progress に更新"

  crg-auto-build:
    type: atomic
    path: commands/crg-auto-build.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.4"
    description: "CRG グラフ自動ビルド"

  opsx-propose:
    type: atomic
    path: commands/opsx-propose.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3"
    description: "OpenSpec 提案ラッパー"

  opsx-apply:
    type: atomic
    path: commands/opsx-apply.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    step_in:
      parent: workflow-test-ready
      step: "2"
    description: "OpenSpec 実装ラッパー"

  opsx-archive: # standalone: 低頻度ユーティリティ
    type: atomic
    path: commands/opsx-archive.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "OpenSpec アーカイブ"

  ac-extract:
    type: atomic
    path: commands/ac-extract.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3.5"
    calls:
      - script: parse-issue-ac
    description: "AC（受け入れ基準）抽出"

  ts-preflight:
    type: atomic
    path: commands/ts-preflight.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "1"
    description: "TypeScript 機械的検証（型チェック・lint）"

  scope-judge:
    type: atomic
    path: commands/scope-judge.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "2.5"
    description: "スコープ判定 + Deferred Issue 作成"

  pr-test:
    type: atomic
    path: commands/pr-test.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "3"
    description: "テスト実行"

  post-fix-verify:
    type: atomic
    path: commands/post-fix-verify.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "4.5"
    description: "fix 後の軽量コードレビュー"

  warning-fix:
    type: atomic
    path: commands/warning-fix.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "5"
    description: "Warning ベストエフォート修正"

  pr-cycle-report:
    type: atomic
    path: commands/pr-cycle-report.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "7"
    description: "PRサイクル結果フォーマット・投稿"

  all-pass-check:
    type: atomic
    path: commands/all-pass-check.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "7.5"
