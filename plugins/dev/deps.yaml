      - script: state-write
    description: "全パス判定（autopilot-first）"

  ac-verify:
    type: atomic
    path: commands/ac-verify.md
    spawnable_by: [workflow]
    can_spawn: []
    description: "AC 検証（テスト結果と AC の照合）"

  # === C-2a: Issue管理系（7個） ===

