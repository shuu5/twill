# loom-plugin-dev 依存関係定義
# version: 3.0
# plugin: dev

version: "3.0"
plugin: dev

entry_points:
  - skills/co-autopilot/SKILL.md
  - skills/co-issue/SKILL.md
  - skills/co-project/SKILL.md
  - skills/co-architect/SKILL.md

# チェーン（B-4 で追加、B-5 で pr-cycle 追加）
chains:
  setup:
    type: "A"
    description: "開発準備ワークフロー（worktree作成 → OpenSpec → テスト準備）"
    steps:
      - init
      - worktree-create
      - project-board-status-update
      - crg-auto-build
      - opsx-propose
      - ac-extract

  pr-cycle:
    type: "B"
    description: "PRサイクル（verify → review → test → fix → visual → report → merge）"
    steps:
      - ts-preflight
      - phase-review
      - scope-judge
      - pr-test
      - fix-phase
      - post-fix-verify
      - warning-fix
      - e2e-screening
      - pr-cycle-report
      - all-pass-check
      - merge-gate

# スキル（controller x4 + workflow x2）
skills:
  co-autopilot:
    type: controller
    path: skills/co-autopilot/SKILL.md
    spawnable_by: [user]
    can_spawn: [composite, atomic, specialist]
    calls:
      - atomic: self-improve-collect
      - atomic: self-improve-propose
      - atomic: self-improve-close
      - atomic: ecc-monitor
    description: "依存グラフに基づくIssue群一括自律実装オーケストレーター"

  co-issue:
    type: controller
    path: skills/co-issue/SKILL.md
    spawnable_by: [user]
    can_spawn: [composite, atomic, reference]
    calls:
      - atomic: explore
      - atomic: issue-dig
      - atomic: issue-structure
      - composite: issue-assess
      - atomic: issue-tech-debt-absorb
      - atomic: issue-create
      - atomic: issue-bulk-create
      - atomic: project-board-sync
    description: "要望をGitHub Issueに変換するワークフロー"

  co-project:
    type: controller
    path: skills/co-project/SKILL.md
    spawnable_by: [user]
    can_spawn: [composite, atomic, reference]
    calls:
      - atomic: project-create
      - atomic: project-governance
      - atomic: project-migrate
      - atomic: container-dependency-check
      - atomic: setup-crg
      - atomic: snapshot-analyze
      - atomic: snapshot-classify
      - atomic: snapshot-generate
      - atomic: plugin-interview
      - atomic: plugin-research
      - atomic: plugin-design
      - atomic: plugin-generate
      - atomic: plugin-migrate-analyze
      - atomic: plugin-diagnose
      - atomic: plugin-fix
      - atomic: plugin-verify
      - composite: plugin-phase-diagnose
      - composite: plugin-phase-verify
    description: "プロジェクト管理（create / migrate / snapshot）"

  co-architect:
    type: controller
    path: skills/co-architect/SKILL.md
    spawnable_by: [user]
    can_spawn: [atomic, reference]
    calls:
      - atomic: explore
      - atomic: architect-completeness-check
      - atomic: architect-decompose
      - atomic: architect-group-refine
      - atomic: architect-issue-create
      - atomic: evaluate-architecture
    description: "対話的アーキテクチャ構築ワークフロー"

  workflow-setup:
    type: workflow
    path: skills/workflow-setup/SKILL.md
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: init
        step: "1"
      - atomic: worktree-create
        step: "2"
      - atomic: project-board-status-update
        step: "2.3"
      - atomic: crg-auto-build
        step: "2.4"
      - atomic: opsx-propose
        step: "3"
      - atomic: ac-extract
        step: "3.5"
    description: "開発準備ワークフロー（chain-driven）"

  workflow-test-ready:
    type: workflow
    path: skills/workflow-test-ready/SKILL.md
    spawnable_by: [controller]
    can_spawn: [composite, atomic]
    calls:
      - composite: test-scaffold
        step: "1"
      - atomic: opsx-apply
        step: "2"
    description: "テスト生成と準備確認ワークフロー"

  workflow-pr-cycle:
    type: workflow
    path: skills/workflow-pr-cycle/SKILL.md
    spawnable_by: [controller]
    can_spawn: [composite, atomic]
    calls:
      - atomic: ts-preflight
        step: "1"
      - composite: phase-review
        step: "2"
      - atomic: scope-judge
        step: "2.5"
      - atomic: pr-test
        step: "3"
      - composite: fix-phase
        step: "4"
      - atomic: post-fix-verify
        step: "4.5"
      - atomic: warning-fix
        step: "5"
      - composite: e2e-screening
        step: "6"
      - atomic: pr-cycle-report
        step: "7"
      - atomic: all-pass-check
        step: "7.5"
      - composite: merge-gate
        step: "8"
    description: "PRサイクルワークフロー（chain-driven）"

  workflow-dead-cleanup:
    type: workflow
    path: skills/workflow-dead-cleanup/SKILL.md
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: dead-component-detect
        step: "1"
      - atomic: dead-component-execute
        step: "3"
    description: "Dead Component 検出結果に基づく確認付き削除ワークフロー"

  workflow-tech-debt-triage:
    type: workflow
    path: skills/workflow-tech-debt-triage/SKILL.md
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: triage-execute
        step: "6"
    description: "tech-debt Issue の棚卸しワークフロー"


# リファレンス（B-6 で追加）
refs:
  ref-specialist-output-schema:
    type: reference
    path: refs/ref-specialist-output-schema.md
    description: "specialist 共通出力スキーマ定義"

  ref-specialist-few-shot:
    type: reference
    path: refs/ref-specialist-few-shot.md
    description: "specialist プロンプト用 few-shot テンプレート"

  ref-issue-template-bug:
    type: reference
    path: refs/ref-issue-template-bug.md
    description: "Bug Report Issue テンプレート"

  ref-issue-template-feature:
    type: reference
    path: refs/ref-issue-template-feature.md
    description: "Feature Request Issue テンプレート"

# コマンド（B-4 で拡充）
commands:
  self-improve-review:
    type: atomic
    path: commands/self-improve-review/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "セッション中のBashエラーをレビューし問題をIssue化候補として構造化"

  init:
    type: atomic
    path: commands/init/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "1"
    description: "開発状態判定"

  worktree-create:
    type: atomic
    path: commands/worktree-create/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2"
    description: "worktree 作成"

  worktree-list:
    type: atomic
    path: commands/worktree-list/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "worktree 一覧表示"

  project-board-status-update:
    type: atomic
    path: commands/project-board-status-update/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.3"
    description: "Project Board Status を In Progress に更新"

  crg-auto-build:
    type: atomic
    path: commands/crg-auto-build/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "2.4"
    description: "CRG グラフ自動ビルド"

  opsx-propose:
    type: atomic
    path: commands/opsx-propose/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3"
    description: "OpenSpec 提案ラッパー"

  opsx-apply:
    type: atomic
    path: commands/opsx-apply/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    step_in:
      parent: workflow-test-ready
      step: "2"
    description: "OpenSpec 実装ラッパー"

  opsx-archive:
    type: atomic
    path: commands/opsx-archive/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "OpenSpec アーカイブ"

  ac-extract:
    type: atomic
    path: commands/ac-extract/COMMAND.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    chain: "setup"
    step_in:
      parent: workflow-setup
      step: "3.5"
    description: "AC（受け入れ基準）抽出"

  ts-preflight:
    type: atomic
    path: commands/ts-preflight/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "1"
    description: "TypeScript 機械的検証（型チェック・lint）"

  scope-judge:
    type: atomic
    path: commands/scope-judge/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "2.5"
    description: "スコープ判定 + Deferred Issue 作成"

  pr-test:
    type: atomic
    path: commands/pr-test/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "3"
    description: "テスト実行"

  post-fix-verify:
    type: atomic
    path: commands/post-fix-verify/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "4.5"
    description: "fix 後の軽量コードレビュー"

  warning-fix:
    type: atomic
    path: commands/warning-fix/COMMAND.md
    spawnable_by: [workflow]
    can_spawn: []
    chain: "pr-cycle"
    step_in:
      parent: workflow-pr-cycle
      step: "5"
