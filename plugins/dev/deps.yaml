# loom-plugin-dev 依存関係定義
# version: 3.0
# plugin: dev

version: "3.0"
plugin: dev

entry_points:
  - skills/co-autopilot/SKILL.md
  - skills/co-issue/SKILL.md
  - skills/co-project/SKILL.md
  - skills/co-architect/SKILL.md

# チェーン（B-4 で追加、B-5 で pr-cycle 追加）
chains:
  setup:
    type: "A"
    description: "開発準備ワークフロー（worktree作成 → OpenSpec → テスト準備）"
    steps:
      - init
      - worktree-create
      - project-board-status-update
      - crg-auto-build
      - opsx-propose
      - ac-extract

  pr-cycle:
    type: "B"
    description: "PRサイクル（verify → review → test → fix → visual → report → merge）"
    steps:
      - ts-preflight
      - phase-review
      - scope-judge
      - pr-test
      - fix-phase
      - post-fix-verify
      - warning-fix
      - e2e-screening
      - pr-cycle-report
      - pr-cycle-analysis
      - all-pass-check
      - merge-gate

# スキル（controller x4 + workflow x2）
skills:
  co-autopilot:
    type: controller
    path: skills/co-autopilot/SKILL.md
    effort: high
    tools: [Agent(worker-*, e2e-*, autofix-loop, spec-scaffold-tests)]
    spawnable_by: [user]
    can_spawn: [composite, atomic, specialist]
    calls:
      - atomic: autopilot-init
        step: "3"
      - atomic: autopilot-launch
      - atomic: autopilot-poll
      - atomic: autopilot-phase-execute
      - atomic: autopilot-phase-postprocess
      - atomic: autopilot-collect
      - atomic: autopilot-retrospective
      - atomic: autopilot-patterns
      - atomic: autopilot-cross-issue
      - atomic: autopilot-summary
        step: "5"
      - atomic: session-audit
        step: "5.5"
      - atomic: self-improve-collect
      - atomic: self-improve-propose
      - atomic: self-improve-close
      - atomic: ecc-monitor
      - workflow: workflow-setup
      - workflow: workflow-test-ready
      - workflow: workflow-pr-cycle
      - workflow: workflow-dead-cleanup
      - workflow: workflow-tech-debt-triage
      - reference: self-improve-format
    description: "依存グラフに基づくIssue群一括自律実装オーケストレーター"

  co-issue:
    type: controller
    path: skills/co-issue/SKILL.md
    effort: high
    tools: [Agent(issue-critic, issue-feasibility, context-checker, template-validator)]
    spawnable_by: [user]
    can_spawn: [composite, atomic, specialist, reference]
    calls:
      - atomic: explore
      - atomic: issue-structure
      - atomic: issue-tech-debt-absorb
      - atomic: issue-create
      - atomic: issue-bulk-create
      - atomic: project-board-sync
      - specialist: issue-critic
      - specialist: issue-feasibility
      - reference: ref-issue-template-bug
      - reference: ref-issue-template-feature
      - reference: ref-project-model
      - reference: ref-issue-quality-criteria
    description: "要望をGitHub Issueに変換するワークフロー"

  co-project:
    type: controller
    path: skills/co-project/SKILL.md
    effort: medium
    tools: [Agent(worker-structure)]
    spawnable_by: [user]
    can_spawn: [composite, atomic, reference]
    calls:
      - atomic: project-create
      - atomic: project-governance
      - atomic: project-migrate
      - atomic: container-dependency-check
      - atomic: setup-crg
      - atomic: snapshot-analyze
      - atomic: snapshot-classify
      - atomic: snapshot-generate
      - atomic: plugin-interview
      - atomic: plugin-research
      - atomic: plugin-design
      - atomic: plugin-generate
      - atomic: plugin-migrate-analyze
      - atomic: plugin-diagnose
      - atomic: plugin-fix
      - atomic: plugin-verify
      - composite: plugin-phase-diagnose
      - composite: plugin-phase-verify
      - reference: ref-types
      - reference: ref-practices
      - reference: ref-deps-format
    description: "プロジェクト管理（create / migrate / snapshot）"

  co-architect:
    type: controller
    path: skills/co-architect/SKILL.md
    effort: high
    tools: [Agent(worker-architecture, worker-structure)]
    spawnable_by: [user]
    can_spawn: [atomic, reference]
    calls:
      - atomic: explore
      - atomic: architect-completeness-check
      - atomic: architect-decompose
      - atomic: architect-group-refine
      - atomic: architect-issue-create
      - atomic: evaluate-architecture
      - reference: ref-architecture-spec
      - reference: ref-architecture
    description: "対話的アーキテクチャ構築ワークフロー"

  workflow-setup:
    type: workflow
    path: skills/workflow-setup/SKILL.md
    effort: medium
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: init
        step: "1"
      - atomic: worktree-create
        step: "2"
      - atomic: project-board-status-update
        step: "2.3"
      - atomic: crg-auto-build
        step: "2.4"
      - atomic: opsx-propose
        step: "3"
      - atomic: ac-extract
        step: "3.5"
    description: "開発準備ワークフロー（chain-driven）"

  workflow-test-ready:
    type: workflow
    path: skills/workflow-test-ready/SKILL.md
    effort: medium
    spawnable_by: [controller]
    can_spawn: [composite, atomic]
    calls:
      - composite: test-scaffold
        step: "1"
      - atomic: opsx-apply
        step: "2"
    description: "テスト生成と準備確認ワークフロー"

  workflow-pr-cycle:
    type: workflow
    path: skills/workflow-pr-cycle/SKILL.md
    effort: medium
    spawnable_by: [controller]
    can_spawn: [composite, atomic]
    calls:
      - atomic: ac-deploy-trigger
      - atomic: ac-verify
      - atomic: ts-preflight
        step: "1"
      - composite: phase-review
        step: "2"
      - atomic: scope-judge
        step: "2.5"
      - atomic: pr-test
        step: "3"
      - composite: fix-phase
        step: "4"
      - atomic: post-fix-verify
        step: "4.5"
      - atomic: warning-fix
        step: "5"
      - composite: e2e-screening
        step: "6"
      - atomic: pr-cycle-report
        step: "7"
      - atomic: pr-cycle-analysis
        step: "7.3"
      - atomic: all-pass-check
        step: "7.5"
      - composite: merge-gate
        step: "8"
      - atomic: auto-merge
        step: "8.5"
    description: "PRサイクルワークフロー（chain-driven）"

  workflow-dead-cleanup:
    type: workflow
    path: skills/workflow-dead-cleanup/SKILL.md
    effort: low
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: dead-component-detect
        step: "1"
      - atomic: dead-component-execute
        step: "3"
    description: "Dead Component 検出結果に基づく確認付き削除ワークフロー"

  workflow-tech-debt-triage:
    type: workflow
    path: skills/workflow-tech-debt-triage/SKILL.md
    effort: medium
    spawnable_by: [controller]
    can_spawn: [atomic]
    calls:
      - atomic: triage-execute
        step: "6"
    description: "tech-debt Issue の棚卸しワークフロー"


