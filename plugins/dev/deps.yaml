    can_spawn: [specialist]
    calls:
      - specialist: worker-structure
      - specialist: worker-principles
      - specialist: worker-architecture
      - reference: ref-specialist-output-schema
      - reference: ref-architecture
    description: "並列検証フェーズ（specialist x3 並列 spawn + 統合処理）"

  # === C-2a: OpenSpec/汎用系（5個） ===

  explore: # standalone: ユーザー直接起動
    type: atomic
    path: commands/explore.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "アイデア検討・問題調査・要件整理のための思考パートナー"

  propose: # standalone: ユーザー直接起動
    type: atomic
    path: commands/propose.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "change ディレクトリを作成し全 artifact を一括生成"

  apply: # standalone: ユーザー直接起動
    type: atomic
    path: commands/apply.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "OpenSpec change の tasks.md に沿ってタスクを実装"

  archive: # standalone: ユーザー直接起動
    type: atomic
    path: commands/archive.md
    spawnable_by: [controller, workflow]
    can_spawn: []
    description: "完了済み change を archive/ に移動"

  check: # standalone: ユーザー直接起動
    type: atomic
