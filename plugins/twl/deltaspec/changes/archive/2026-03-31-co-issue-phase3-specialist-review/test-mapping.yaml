#   (depends on specialist LLM output)
# - co-issue-phase3-redesign.md: "split 提案の適用"
#   (user interaction + LLM behaviour)
# - co-issue-phase3-redesign.md: "--quick 指定時"
#   (runtime flag handling in SKILL.md, not structurally verifiable)
# - issue-critic-agent.md: 曖昧な受け入れ基準の検出, 未検証の仮定, etc.
#   (LLM agent behaviour)
# - issue-feasibility-agent.md: 対象ファイルが存在しない, 影響範囲の見落とし, etc.
#   (LLM agent behaviour)
# - ref-issue-quality-criteria.md: specialist への品質基準注入, severity 判定基準
#   (LLM agent injection behaviour)
