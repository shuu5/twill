mappings:
  - ac_index: 1
    ac_text: "4 agent ファイル (worker-fastapi-reviewer.md / worker-hono-reviewer.md / worker-nextjs-reviewer.md / worker-r-reviewer.md) を削除する"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC1: worker-fastapi-reviewer.md は削除されている"
      - "AC1: worker-hono-reviewer.md は削除されている"
      - "AC1: worker-nextjs-reviewer.md は削除されている"
      - "AC1: worker-r-reviewer.md は削除されている"
    status: RED

  - ac_index: 2
    ac_text: "worker-code-reviewer.md に languages frontmatter + 言語別観点セクション + 呼び出し規約を追加する"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC2: worker-code-reviewer.md frontmatter に languages フィールドが存在する"
      - "AC2: frontmatter languages に fastapi/hono/nextjs/r/generic 5 値が列挙されている"
      - "AC2: worker-code-reviewer.md に 言語別観点 (language hint) セクションが存在する"
      - "AC2: worker-code-reviewer.md に呼び出し規約 (language=<name>: 形式) が明記されている"
    status: RED

  - ac_index: 3
    ac_text: "deps.yaml の 4 agent 参照削除 + tech-stack-detect.sh の language hint 出力統一"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC3: deps.yaml に worker-fastapi-reviewer の参照が存在しない"
      - "AC3: deps.yaml に worker-hono-reviewer の参照が存在しない"
      - "AC3: deps.yaml に worker-nextjs-reviewer の参照が存在しない"
      - "AC3: deps.yaml に worker-r-reviewer の参照が存在しない"
      - "AC3: tech-stack-detect.sh の旧 reviewer マッピングが worker-code-reviewer に統一されている"
      - "AC3: tech-stack-detect.sh が language hint (language=xxx 形式) を出力する"
    status: RED

  - ac_index: 4
    ac_text: "worker-code-reviewer.md の言語別観点節に各言語のキーワードが含まれる (bats 静的検証)"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC4: language=fastapi: agent body に async def が含まれる"
      - "AC4: language=fastapi: agent body に Pydantic v2 が含まれる"
      - "AC4: language=fastapi: agent body に Annotated が含まれる"
      - "AC4: language=hono: agent body に Zod スキーマ整合性 が含まれる"
      - "AC4: language=hono: agent body に @hono/zod-openapi が含まれる"
      - "AC4: language=nextjs: agent body に Server Component が含まれる"
      - "AC4: language=nextjs: agent body に 'use client' が含まれる"
      - "AC4: language=r: agent body に tidyverse が含まれる"
      - "AC4: language=r: agent body に .Rmd が含まれる"
    status: RED

  - ac_index: 5
    ac_text: "twl check / twl check --deps-integrity が PASS する (4 agent 参照ゼロ)"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC5: deps.yaml に削除 4 agent への参照がゼロ件である"
    status: RED
    note: "twl check --deps-integrity の実行は AC5 最終確認で手動実施"

  - ac_index: 6
    ac_text: "tech-stack-detect.sh のディスパッチが worker-code-reviewer に統一され specialist-audit が整合する"
    test_file: "plugins/twl/tests/bats/agents/worker-code-reviewer-language-hint.bats"
    test_names:
      - "AC6: tech-stack-detect.sh の R ファイル検出ルールが worker-r-reviewer を使用していない"
      - "AC6: tech-stack-detect.sh の FastAPI 検出ルールが worker-fastapi-reviewer を使用していない"
      - "AC6: tech-stack-detect.sh の Next.js 検出ルールが worker-nextjs-reviewer を使用していない"
      - "AC6: tech-stack-detect.sh が少なくとも 1 つの worker-code-reviewer 参照を持つ"
    status: RED
