mappings:
  - ac_index: 1
    ac_text: >
      session-init.sh および su-postcompact.sh の Python ブロックで
      claude_session_id 書き込み前に UUID v4 regex
      ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      を assert する。空文字列も許容。違反時は
      [<script>] WARN: invalid claude_session_id rejected: <value>
      を stderr 出力し書き込みを skip。
    test_file: "plugins/twl/tests/bats/scripts/session-id-uuid-validation.bats"
    test_names:
      - "ac1-write-session-init: invalid claude_session_id=post-compact-value で WARN が stderr に出力される"
      - "ac1-write-session-init: invalid claude_session_id が session.json に書き込まれない（既存値保持）"
      - "ac1-write-session-init: 正しい UUID v4 → session.json に正常書き込みされる"
      - "ac1-write-session-init: 空文字列 claude_session_id は session.json に空のまま記録される（許容）"
      - "ac1-static-session-init: Python ブロックに UUID v4 regex 検証が存在する"
      - "ac1-write-postcompact: invalid NEW_SESSION_ID_VAL で WARN が stderr に出力される"
      - "ac1-write-postcompact: invalid NEW_SESSION_ID_VAL で session.json の claude_session_id が変更されない"
      - "ac1-static-postcompact: su-postcompact.sh の Python ブロックに UUID v4 regex 検証が存在する"
    impl_files:
      - "plugins/twl/skills/su-observer/scripts/session-init.sh"
      - "plugins/twl/scripts/su-postcompact.sh"

  - ac_index: 2
    ac_text: >
      cld:59-71 で claude_session_id 読み取り直後に UUID v4 check。
      違反時は actionable error（Invalid claude_session_id in session.json: <value>
      + Recovery 手順）を stderr に出力し exit 1。
    test_file: "plugins/twl/tests/bats/scripts/session-id-uuid-validation.bats"
    test_names:
      - "ac2-read-cld-observer: invalid claude_session_id で cld --observer が exit 1 する"
      - "ac2-read-cld-observer: invalid claude_session_id で actionable error が stderr に出力される"
      - "ac2-read-cld-observer: 正しい UUID v4 → exec claude --resume が呼ばれる"
      - "ac2-static-cld: cld の claude_session_id 読み取り部に UUID v4 検証が存在する"
    impl_files:
      - "plugins/session/scripts/cld"

  - ac_index: 3
    ac_text: >
      refs/session-schema.md 更新（doc-only AC、バイナリテストなし）
    test_file: ""
    test_names: []
    impl_files:
      - "plugins/twl/skills/su-observer/refs/session-schema.md"
    # doc-only AC: bats テストなし。ファイル存在は手動確認。

  - ac_index: 4
    ac_text: >
      su-observer/SKILL.md の Step 0 復帰パス書き換え（doc-only AC）
    test_file: ""
    test_names: []
    impl_files:
      - "plugins/twl/skills/su-observer/SKILL.md"
    # doc-only AC: bats テストなし。

  - ac_index: 5
    ac_text: >
      pitfalls-catalog + ref-invariants への doc ファイル追加（doc-only AC）
    test_file: ""
    test_names: []
    impl_files: []
    # doc-only AC: bats テストなし。
    # impl_files 推定失敗: pitfalls-catalog.md / ref-invariants.md のパス未確定。手動補完が必要。

  - ac_index: 6
    ac_text: >
      plugins/twl/tests/bats/scripts/session-id-uuid-validation.bats を新設。
      write-side (AC1): session-init.sh / su-postcompact.sh の invalid / valid / empty ケース。
      read-side (AC2): cld --observer の invalid → exit 1 / valid → --resume 呼び出し。
      boundary: 空文字列 / "null" / 短縮UUID / full UUID / hyphen数違い の各ケース。
    test_file: "plugins/twl/tests/bats/scripts/session-id-uuid-validation.bats"
    test_names:
      - "ac6-boundary: 空文字列 claude_session_id で cld --observer が exit 1 する"
      - "ac6-boundary: 文字列 'null' claude_session_id で cld --observer が exit 1 する"
      - "ac6-boundary: 短縮UUID b364fc8a で cld --observer が exit 1 する"
      - "ac6-boundary: ハイフン数違い UUID（3ハイフン）で cld --observer が exit 1 する"
      - "ac6-boundary: 正しいフル UUID で cld --observer が exit 0 し --resume が呼ばれる"
      - "ac6: session-id-uuid-validation.bats が plugins/twl/tests/bats/scripts/ に存在する"
    impl_files:
      - "plugins/twl/skills/su-observer/scripts/session-init.sh"
      - "plugins/twl/scripts/su-postcompact.sh"
      - "plugins/session/scripts/cld"
