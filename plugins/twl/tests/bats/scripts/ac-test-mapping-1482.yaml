    test_file: "plugins/twl/tests/bats/scripts/worker-red-only-detector.bats"
    test_names:
      - "ac2: worker-red-only-detector.md に gh pr view --json files コマンドへの言及がある"
      - "ac2: worker-red-only-detector.md に impl-candidate ファイルパターンが定義されている"
