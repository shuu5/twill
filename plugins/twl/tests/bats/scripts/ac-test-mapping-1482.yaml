      - "ac4: merge-gate モードで worker-red-only-detector が出力される"
      - "ac4: phase-review モードで worker-red-only-detector が出力される"
      - "ac4: worker-red-only-detector が pr-review-manifest.sh のコード内に記載されている"
    impl_files:
