  - ac_index: 5
    ac_text: "False-positive 抑止: 純粋 RED test PR (label 'red-only' 明示付き) はスキップ、その後の green-impl PR で AC1 の機械検証を経る運用に"
    test_file: "plugins/twl/tests/bats/scripts/worker-red-only-detector.bats"
    test_names:
      - "ac5: worker-red-only-detector.md に red-only ラベルチェックへの言及がある"
      - "ac5: worker-red-only-detector.md に SKIP または スキップへの言及がある"
    impl_files:
      - plugins/twl/agents/worker-red-only-detector.md

