      - "ac6: scenario: test+impl PR で CRITICAL が検出されない"
      - "ac6: scenario: docs-only PR で CRITICAL が検出されない"
      - "ac6: scenario: red-only ラベル付き PR で CRITICAL がスキップされる"
    impl_files:
      - plugins/twl/agents/worker-red-only-detector.md
