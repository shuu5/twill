      - "ac2: worker-red-only-detector.md に CRITICAL severity への言及がある"
    impl_files:
      - plugins/twl/agents/worker-red-only-detector.md

  - ac_index: 3
    ac_text: "PR body から「実装」「新設」「migrate」等 implementation claim キーワードを抽出、impl-candidate ファイル変更と不整合なら CRITICAL"
    test_file: "plugins/twl/tests/bats/scripts/worker-red-only-detector.bats"
    test_names:
      - "ac3: worker-red-only-detector.md に PR body 解析への言及がある"
      - "ac3: worker-red-only-detector.md に implementation claim キーワード（実装|新設|migrate）への言及がある"
    impl_files:
