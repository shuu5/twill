mappings:
  - ac_index: 1
    ac_text: "autopilot-orchestrator.sh detect_input_waiting() に Press up to edit queued messages:queued_message_residual pattern を追加し、検知時に tmux send-keys -t <window> Enter を auto-recovery action として実行する。debounce 2-cycle 確定後に 1 回のみ発火（INPUT_WAITING_SEEN_PATTERN カウンタが 2 に達した時点）。Enter 送信後は INPUT_WAITING_SEEN_PATTERN をリセット。"
    test_file: "plugins/twl/tests/bats/scripts/autopilot-orchestrator-stuck-patterns.bats"
    test_name: "T1a: queued_message_residual 1cycle 目 — Enter 送信なし（debounce 1 回目）"
    impl_files:
      - "plugins/twl/scripts/autopilot-orchestrator.sh"
  - ac_index: 1
    ac_text: "AC1 (Pattern 1): queued_message_residual — debounce 2 cycle 後に Enter 1 回のみ送信"
    test_file: "plugins/twl/tests/bats/scripts/autopilot-orchestrator-stuck-patterns.bats"
    test_name: "T1b: queued_message_residual 2cycle 目 — Enter が 1 回のみ送信される（debounce 確定）"
    impl_files:
      - "plugins/twl/scripts/autopilot-orchestrator.sh"
  - ac_index: 1
    ac_text: "AC1 (Pattern 1): queued_message_residual — Enter 送信後は INPUT_WAITING_SEEN_PATTERN をリセット"
    test_file: "plugins/twl/tests/bats/scripts/autopilot-orchestrator-stuck-patterns.bats"
    test_name: "T1c: queued_message_residual Enter 送信後リセット — 3cycle 目は再び 1 回目扱い"
    impl_files:
