  - ac_index: 2
    ac_text: "detect_input_waiting() に ERE 互換 pattern (開始|始め)(て|します)[^？?]*[？?]?:freeform_kaishi を追加し、検知時は状態書き込み + observer 通知のみ（auto-recovery しない）。状態書き込み: input_waiting_state ファイルに ${issue}:freeform_kaishi:${timestamp} 形式で追記。observer 通知: twl notify-supervisor または既存 OBSERVER_NOTIFY_CHANNEL 経由で [input_waiting] issue=${issue} pattern=freeform_kaishi 送信（同一 issue:pattern 組み合わせは 60 秒以内の重複通知を抑止）。"
    test_file: "plugins/twl/tests/bats/scripts/autopilot-orchestrator-stuck-patterns.bats"
    test_name: "T2a: freeform_kaishi 検知 — STATE_LOG に書き込み、tmux send-keys なし"
    impl_files:
      - "plugins/twl/scripts/autopilot-orchestrator.sh"
  - ac_index: 2
