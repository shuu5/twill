    impl_files:
      - "cli/twl/src/twl/autopilot/launcher.py"

  - ac_index: "4iv"
    ac_text: "AC4(iv): _check_dual_write_log が log 不在時に None/空を返すこと"
    test_file: "plugins/twl/tests/bats/skills/refined-dual-write-observability.bats"
    test_name: "ac4(iv): _check_dual_write_log が log 不在時に None/空を返す (python3 -c)"
    impl_files:
