  # ---------------------------------------------------------------------------

  - ac_index: "4i"
    ac_text: "AC4(i): dual_write_log WARN label_add_failed が [TIMESTAMP] WARN label_add_failed issue=#<N> 形式で書き込まれること (bats)"
    test_file: "plugins/twl/tests/bats/skills/refined-dual-write-observability.bats"
