  - ac_index: 3b
    ac_text: "schema 文書が ac_missing category を列挙していること"
    test_file: "plugins/twl/tests/bats/issue-1025-specialist-warning-gate.bats"
    test_name: "ac3: schema 文書が category=ac_missing を列挙していること"
  - ac_index: 3c
    ac_text: "phase-review.json findings エントリが必須フィールドを持つこと"
    test_file: "plugins/twl/tests/bats/issue-1025-specialist-warning-gate.bats"
    test_name: "ac3: phase-review.json findings エントリが severity/category/message/confidence の必須フィールドを持つ"
  - ac_index: 4
