mappings:
  - ac_index: 1
    ac_text: "plugins/twl/skills/su-observer/refs/observer-supervise-checklist.md が新規作成されている"
    test_file: "plugins/twl/tests/bats/issue-1245-observer-checklist.bats"
    test_names:
