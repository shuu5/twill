mappings:
  - ac_index: 1
    ac_text: "worker-code-reviewer.md の「### 2. バグパターン」セクション内、`- 競合状態の可能性` の箇条書き直後（`**False-positive 除外ルール（純粋 boolean 変数の条件式順序差）**` ブロックの直前）に tmux 破壊的操作のターゲット解決 bullet を追記する。kill-window / kill-session / respawn-window 等の destructive op で window 名を直接 -t に渡す実装を CRITICAL (confidence >= 90) として報告。"
    test_file: "plugins/twl/tests/bats/worker-code-reviewer-tmux-1143.bats"
    test_names:
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet exists in worker-code-reviewer.md"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'CRITICAL'"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions confidence >= 90 in tmux context"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'kill-window' and 'kill-session'"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'respawn-window'"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'window_name' or '#{window_name}'"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'ambiguous target' or '誤 kill'"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'list-windows' resolution"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet mentions 'session:index' format"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet references pitfalls-catalog §4.11"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet references §4.9 or Issue #948"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet references tmux-resolve.sh or _resolve_window_target"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet references Issue #1142"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet appears inside §2 バグパターン section"
      - "worker-code-reviewer-tmux-1143: AC1 tmux bullet appears after '競合状態の可能性' bullet"
    impl_files:
      - "plugins/twl/agents/worker-code-reviewer.md"

