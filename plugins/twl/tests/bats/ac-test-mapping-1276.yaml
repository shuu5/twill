mappings:
  - ac_index: 1
    ac_text: ".claude/settings.json の PreToolUse Bash matcher に mcp_tool entry を追加（既存 bash hook entry は維持）"
    test_file: "plugins/twl/tests/bats/issue-1276-merge-guard-hook.bats"
    test_name: "ac1: settings.json の Bash matcher hooks に mcp_tool タイプのエントリが存在する"
    impl_files:
      - ".claude/settings.json"

  - ac_index: 2
    ac_text: "mcp_tool entry が mcp__twl__twl_validate_merge を呼び、${tool_input.command} を引数に渡すこと"
    test_file: "plugins/twl/tests/bats/issue-1276-merge-guard-hook.bats"
    test_name: "ac2: mcp_tool entry の tool フィールドが twl_validate_merge である"
    impl_files:
      - ".claude/settings.json"

  - ac_index: 3
    ac_text: "mcp_tool 失敗時は warning ログのみ（block しない）— outputType: \"log\" 指定"
    test_file: "plugins/twl/tests/bats/issue-1276-merge-guard-hook.bats"
    test_name: "ac3: mcp_tool entry の outputType が log である"
    impl_files:
      - ".claude/settings.json"

  - ac_index: 4
    ac_text: "bats fixture 5 件（main → feature merge / direct main commit reject / squash variant / non-merge git command / edge: detached HEAD）で bash と mcp_tool の出力を突合し mismatch 0 を確認"
    test_file: "plugins/twl/tests/bats/issue-1276-merge-guard-hook.bats"
    test_name: "ac4-shadow-compare: mcp-shadow-compare.sh が mismatch 0 を報告する（全5 fixture後）"
    impl_files:
      - "plugins/twl/scripts/hooks/pre-bash-merge-guard.sh"
      - "plugins/twl/scripts/mcp-shadow-compare.sh"

  - ac_index: 5
    ac_text: "mcp-shadow-compare.sh 互換ログを /tmp/mcp-shadow-merge-guard.log に追記する形式で配置"
    test_file: "plugins/twl/tests/bats/issue-1276-merge-guard-hook.bats"
    test_name: "ac5: pre-bash-merge-guard.sh が git merge コマンドで shadow log に JSONL を書き込む"
    impl_files:
      - "plugins/twl/scripts/hooks/pre-bash-merge-guard.sh"
