# plugin-twl 依存関係定義
# version: 3.0
# plugin: twl
#
# [#107] 2026-04-07: 125 コンポーネント (skills+commands+agents、#106 対象 11 件を除く)
# に対し twl:worker-prompt-reviewer specialist を個別 spawn して実レビュー済み。
# 結果: PASS=41 / WARN=65 / FAIL=19
# refined_by ハッシュ 2c7a62f2 は refs/ref-prompt-guide.md の SHA-1(先頭8)。
# NEEDS_WORK 件の大半 (74件) は commands/ の frontmatter 欠落で、
# 軽微修正の範囲を超えるため tech-debt #161 で一括対応する。

version: "3.0"
plugin: twl

entry_points:
  - skills/co-autopilot/SKILL.md
  - skills/co-issue/SKILL.md
  - skills/co-explore/SKILL.md
  - skills/co-project/SKILL.md
  - skills/co-architect/SKILL.md
  - skills/co-utility/SKILL.md
  - skills/co-self-improve/SKILL.md
  - skills/su-observer/SKILL.md

# チェーン（B-4 で追加、B-5 で pr-cycle 追加）
chains:
  setup:
    type: "A"
    description: "開発準備ワークフロー（worktree作成 → DeltaSpec → テスト準備）"
    steps:
      - init
      - worktree-create
      - project-board-status-update
      - crg-auto-build
      - change-propose
      - ac-extract

  test-ready:
    type: "B"
    description: "テスト生成と準備確認（DeltaSpec → テスト → 実装）"
    steps:
      - arch-ref
      - change-id-resolve
      - test-scaffold
      - check
      - change-apply
      - post-change-apply

  pr-verify:
    type: "B"
    description: "PR検証（preflight → review → scope → test → ac-verify）"
    steps:
      - prompt-compliance
      - ts-preflight
      - phase-review
      - scope-judge
      - pr-test
      - ac-verify

  pr-fix:
    type: "B"
    description: "PR修正（fix → post-fix-verify → warning-fix）"
    steps:
      - fix-phase
      - post-fix-verify
      - warning-fix

  pr-merge:
    type: "B"
    description: "PRマージ（e2e → report → analysis → check → merge）"
    steps:
      - e2e-screening
      - pr-cycle-report
      - pr-cycle-analysis
      - all-pass-check
      - merge-gate
      - auto-merge

  arch-review:
    type: "B"
    description: "Architecture docs 専用 PR レビュー（arch-phase-review → arch-fix-phase、その後 merge-gate → auto-merge を再利用）"
    steps:
      - arch-phase-review
      - arch-fix-phase

# メタ chain（ワークフロー間遷移 SSOT）
meta_chains:
  worker-lifecycle:
    type: "meta"
    description: "Worker の Issue 実装ライフサイクル（全 chain を結合）"
    flow:
      - id: setup
        chain: setup
        next:
          - condition: "quick && autopilot"
            goto: quick-path
            workflow_done: "setup"
          - condition: "!quick && autopilot"
            goto: test-ready
            workflow_done: "setup"
          - condition: "!autopilot"
            stop: true
            message: "setup chain 完了。次: /twl:workflow-test-ready"

      - id: quick-path
        chain: null
        description: "quick Issue の短縮パス"
        inline_steps:
          - "直接実装 → commit → push"
          - "PR 作成"
          - "ac-verify"
          - "merge-gate"
        next:
          - goto: done

      - id: test-ready
        chain: test-ready
        skill: workflow-test-ready
        next:
          - condition: "autopilot"
            goto: pr-verify
            workflow_done: "test-ready"
          - condition: "!autopilot"
            stop: true
            message: "完了。次: /twl:workflow-pr-verify"
      - id: pr-verify
        chain: pr-verify
        skill: workflow-pr-verify
        next:
          - condition: "autopilot"
            goto: pr-fix
            workflow_done: "pr-verify"
          - condition: "!autopilot"
            stop: true
            message: "workflow-pr-verify 完了。次のステップ: /twl:workflow-pr-fix を実行してください"
      - id: pr-fix
        chain: pr-fix
        skill: workflow-pr-fix
        next:
          - condition: "autopilot"
            goto: pr-merge
            workflow_done: "pr-fix"
          - condition: "!autopilot"
            stop: true
            message: "workflow-pr-fix 完了。次のステップ: /twl:workflow-pr-merge を実行してください"

      - id: done
        terminal: true
      - id: pr-merge
        chain: pr-merge
        skill: workflow-pr-merge
        terminal: true

