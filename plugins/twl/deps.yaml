    path: scripts/ac-checklist-gen.sh
    description: "Issue body の AC を checkbox 化し副作用キーワードを [!] でマーク"

  pr-link-issue:
    type: script
    path: scripts/pr-link-issue.sh
    description: "既存 PR の本文に Closes #N を追記する修復ヘルパー（--close-issue で gh issue close 直接実行）"

  spec-review-manifest:
    type: script
    path: scripts/spec-review-manifest.sh
    description: "issue-spec-review 必須 specialist リスト出力（3 行 = 3 agent type）"

  spec-review-session-init:
    type: script
    path: scripts/spec-review-session-init.sh
    description: "spec-review セッション state ファイルを初期化（total 引数で Issue 数を設定、flock 競合制御付き）"

  spec-review-orchestrator:
    type: script
    path: scripts/spec-review-orchestrator.sh
    calls:
      - script: spec-review-session-init
      - script: cld-spawn
        plugin: session
      - script: session-comm.sh
        plugin: session
    description: "Bash ループで N Issue の spec-review を並列実行（tmux cld セッション spawn + ポーリング + 結果収集。MAX_PARALLEL 環境変数でバッチサイズ制御。cld-spawn + inject-file パターンで spawn — #541）"

  issue-lifecycle-orchestrator:
    type: script
    path: scripts/issue-lifecycle-orchestrator.sh
    calls:
      - script: cld-spawn
        plugin: session
      - script: session-comm.sh
        plugin: session
    description: "co-issue v2 Pilot が呼ぶバッチ orchestrator: N per-issue dir の workflow-issue-lifecycle を tmux cld で並列起動（cld-spawn + inject-file パターンで spawn — #541。MAX_PARALLEL / flock / resume 対応。ADR-017 IM-7: N=1 初期化は各 Worker が個別に実施）"

  pre-tool-use-spec-review-gate:
    type: script
    path: scripts/hooks/pre-tool-use-spec-review-gate.sh
    description: "PreToolUse gate: completed < total の間 issue-review-aggregate を deny する（Skill tool matcher）"

  pre-bash-refined-label-gate:
    type: script
    path: scripts/hooks/pre-bash-refined-label-gate.sh
    description: "PreToolUse gate (Layer D): spec-review session state 非存在時に gh issue edit --add-label refined を deny する（Bash tool matcher）。Worker セッション内（/tmp/.spec-review-session-*.json 存在時）は allow"

  pre-bash-phase3-gate:
    type: script
    path: scripts/hooks/pre-bash-phase3-gate.sh
    description: "PreToolUse gate (Layer C-2): co-issue Phase 3 未完了時に gh issue create / gh issue edit --add-label refined を deny する（Bash tool matcher）。gate state /tmp/.co-issue-phase3-gate-{cksum}.json で管理"

  supervisor-heartbeat:
    type: script
    path: scripts/hooks/supervisor-heartbeat.sh
    description: "PostToolUse hook (Write|Edit): AUTOPILOT_DIR 設定時に heartbeat イベントファイルを .supervisor/events/heartbeat-<session_id> にアトミック書き出し（#569 Event Emission インフラ）"

  supervisor-input-wait:
    type: script
    path: scripts/hooks/supervisor-input-wait.sh
    description: "PreToolUse hook (AskUserQuestion): AUTOPILOT_DIR 設定時に input-wait イベントファイルを .supervisor/events/input-wait-<session_id> にアトミック書き出し（#569 Event Emission インフラ）"

  supervisor-input-clear:
    type: script
    path: scripts/hooks/supervisor-input-clear.sh
    description: "PostToolUse hook (AskUserQuestion): AUTOPILOT_DIR 設定時に input-wait イベントファイルを削除（#569 Event Emission インフラ）"

  supervisor-skill-step:
    type: script
    path: scripts/hooks/supervisor-skill-step.sh
    description: "PostToolUse hook (Skill): AUTOPILOT_DIR 設定時に skill-step イベントファイルを .supervisor/events/skill-step-<session_id> にアトミック書き出し（#569 Event Emission インフラ）"

  supervisor-session-end:
    type: script
    path: scripts/hooks/supervisor-session-end.sh
    description: "Stop hook: AUTOPILOT_DIR 設定時に session-end イベントファイルを .supervisor/events/session-end-<session_id> にアトミック書き出し（#569 Event Emission インフラ）"

  pr-review-manifest:
    type: script
    path: scripts/pr-review-manifest.sh
    calls:
      - script: tech-stack-detect
      - script: resolve-issue-num
    description: "PR review 系 specialist 選択の動的マニフェスト（phase-review / merge-gate / post-fix-verify）。phase-review/merge-gate モードで Issue 番号が解決可能な場合 worker-issue-pr-alignment を出力に含める。merge-gate モードで chain 関連ファイル (deps.yaml/SKILL.md/chain-runner.sh) 変更時は worker-workflow-integrity を追加"

  audit:
    type: script
    path: ../../cli/twl/src/twl/autopilot/audit.py
    description: "autopilot 実行履歴の永続化（twl audit on/off/status + is_audit_active/resolve_audit_dir ヘルパー）"

  checkpoint-write:
    type: script
    path: ../../cli/twl/src/twl/autopilot/checkpoint.py
    description: "composite 完了時に specialist findings を .autopilot/checkpoints/<step>.json に書き出す"

  checkpoint-read:
    type: script
    path: ../../cli/twl/src/twl/autopilot/checkpoint.py
    description: "checkpoint ファイルから要約フィールドまたは CRITICAL findings を読み取る"

  observe-wrapper:
    type: script
    path: scripts/observe-wrapper.sh
    calls:
      - script: session:cld-observe
    description: "session plugin の cld-observe を呼び出す cross-plugin wrapper"

  session-state-wrapper:
    type: script
    path: scripts/session-state-wrapper.sh
    calls:
      - script: session:session-state
    description: "session plugin の session-state.sh を呼び出す cross-plugin wrapper"

  observer-evaluator-parser:
    type: script
    path: scripts/observer-evaluator-parser.sh
    spawnable_by: [composite, atomic, workflow]
    can_spawn: []
    description: "observer-evaluator の出力 JSON を validation (引用 MUST 検証 + confidence クランプ)"

  merge-gate-check-pr:
    type: script
    path: scripts/merge-gate-check-pr.sh
    description: "PR 存在確認（merge-gate）: PR が存在しない場合は REJECT checkpoint を書き込んで exit 1"

  merge-gate-build-manifest:
    type: script
    path: scripts/merge-gate-build-manifest.sh
    calls:
      - script: pr-review-manifest
    description: "動的レビュアー構築（merge-gate）: MANIFEST_FILE / CONTEXT_ID / SPAWNED_FILE を設定する（source で読み込む）"

  merge-gate-check-spawn:
    type: script
    path: scripts/merge-gate-check-spawn.sh
    description: "spawn 完了確認（merge-gate）: 未 spawn specialist がある場合 ERROR + exit 1"

  merge-gate-cross-pr-ac:
    type: script
    path: scripts/merge-gate-cross-pr-ac.sh
    calls:
      - script: resolve-issue-num
      - script: checkpoint-write
    description: "Cross-PR AC 検証（merge-gate）: implementation_pr のマージコミットを checkpoint に記録"

  merge-gate-checkpoint-merge:
    type: script
    path: scripts/merge-gate-checkpoint-merge.sh
    calls:
      - script: checkpoint-read
    description: "checkpoint 統合（merge-gate）: specialist / ac-verify / phase-review findings を jq で統合して stdout 出力"

  merge-gate-check-phase-review:
    type: script
    path: scripts/merge-gate-check-phase-review.sh
    calls:
      - script: resolve-issue-num
      - script: checkpoint-read
    description: "phase-review 必須チェック（merge-gate）: phase-review 不在時は REJECT。scope/direct / quick ラベルはスキップ"

