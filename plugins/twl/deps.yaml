# plugin-twl 依存関係定義
# version: 3.0
# plugin: twl

version: "3.0"
plugin: twl

entry_points:
  - skills/co-autopilot/SKILL.md
  - skills/co-issue/SKILL.md
  - skills/co-project/SKILL.md
  - skills/co-architect/SKILL.md
  - skills/co-utility/SKILL.md

# チェーン（B-4 で追加、B-5 で pr-cycle 追加）
chains:
  setup:
    type: "A"
    description: "開発準備ワークフロー（worktree作成 → DeltaSpec → テスト準備）"
    steps:
      - init
      - worktree-create
      - project-board-status-update
      - crg-auto-build
      - change-propose
      - ac-extract

  pr-verify:
    type: "B"
    description: "PR検証（preflight → review → scope → test → ac-verify）"
    steps:
      - ts-preflight
      - phase-review
      - scope-judge
      - pr-test
      - ac-verify

  pr-fix:
    type: "B"
    description: "PR修正（fix → post-fix-verify → warning-fix）"
    steps:
      - fix-phase
      - post-fix-verify
      - warning-fix

  pr-merge:
    type: "B"
    description: "PRマージ（e2e → report → analysis → check → merge）"
    steps:
      - e2e-screening
      - pr-cycle-report
      - pr-cycle-analysis
      - all-pass-check
      - merge-gate
      - auto-merge

# スキル（controller x4 + workflow x2）
skills:
  co-autopilot:
    type: controller
    refined_by: "ref-prompt-guide@2c7a62f2"
    refined_at: "2026-04-07"
    path: skills/co-autopilot/SKILL.md
    effort: high
    tools: [Agent(worker-*, e2e-*, autofix-loop, spec-scaffold-tests)]
    spawnable_by: [user]
    can_spawn: [composite, atomic, specialist]
    calls:
      - atomic: autopilot-init
        step: "3"
      - atomic: autopilot-launch
      - atomic: autopilot-poll
      - atomic: autopilot-phase-execute
      - atomic: autopilot-phase-postprocess
      - atomic: autopilot-collect
      - atomic: autopilot-retrospective
      - atomic: autopilot-patterns
      - atomic: autopilot-cross-issue
      - atomic: autopilot-summary
        step: "5"
      - atomic: session-audit
        step: "5.5"
      - atomic: self-improve-review
      - workflow: workflow-setup
      - workflow: workflow-test-ready
      - workflow: workflow-pr-verify
      - workflow: workflow-pr-fix
      - workflow: workflow-pr-merge
      - workflow: workflow-dead-cleanup
      - workflow: workflow-tech-debt-triage
      - workflow: workflow-self-improve
      - script: autopilot-orchestrator
      - script: autopilot-plan
    description: "依存グラフに基づくIssue群一括自律実装オーケストレーター"

  co-issue:
    type: controller
    refined_by: "ref-prompt-guide@2c7a62f2"
    refined_at: "2026-04-07"
