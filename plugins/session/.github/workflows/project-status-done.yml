name: Set Project Status to Done on Issue Close

on:
  issues:
    types: [closed]

env:
  PROJECT_ID: "PVT_kwHOCNFEd84BS03g"
  STATUS_FIELD_ID: "PVTSSF_lAHOCNFEd84BS03gzhAPzog"
  DONE_OPTION_ID: "98236657"

jobs:
  set-status-done:
    runs-on: ubuntu-latest
    steps:
      - name: Get Project Item ID
        id: find-item
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: |
          CURSOR=""
          ITEM_ID=""

          while true; do
            if [ -n "$CURSOR" ]; then
              CURSOR_ARG="-f cursor=$CURSOR"
            else
              CURSOR_ARG=""
            fi

            RESULT=$(gh api graphql -f query='
              query($projectId: ID!, $cursor: String) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100, after: $cursor) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository { nameWithOwner }
                          }
                        }
                      }
                      pageInfo { hasNextPage endCursor }
                    }
                  }
                }
              }
            ' -f projectId="$PROJECT_ID" $CURSOR_ARG)

            ITEM_ID=$(echo "$RESULT" | jq -r \
              --argjson num "$ISSUE_NUMBER" \
              --arg repo "$REPO_NAME" \
              '.data.node.items.nodes[] | select(.content.number == $num and .content.repository.nameWithOwner == $repo) | .id' \
            )

            if [ -n "$ITEM_ID" ]; then
              break
            fi

            HAS_NEXT=$(echo "$RESULT" | jq -r '.data.node.items.pageInfo.hasNextPage')
            if [ "$HAS_NEXT" != "true" ]; then
              break
            fi

            CURSOR=$(echo "$RESULT" | jq -r '.data.node.items.pageInfo.endCursor')
          done

          if [ -z "$ITEM_ID" ]; then
            echo "::notice::Item not found in project — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "item_id=$ITEM_ID" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Status to Done
        if: steps.find-item.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.find-item.outputs.item_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          RESULT=$(gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }
          ' \
            -f projectId="$PROJECT_ID" \
            -f itemId="$ITEM_ID" \
            -f fieldId="$STATUS_FIELD_ID" \
            -f optionId="$DONE_OPTION_ID" 2>&1)

          if echo "$RESULT" | jq -e '.errors' > /dev/null 2>&1; then
            echo "::error::GraphQL mutation failed: $(echo "$RESULT" | jq -c '.errors')"
            exit 1
          fi

          echo "Status updated to Done for issue #$ISSUE_NUMBER"
