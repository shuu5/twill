# plugin-session 依存関係定義
# version: 3.0
# plugin: session

version: "3.0"
plugin: session

entry_points:
  - skills/spawn/SKILL.md
  - skills/observe/SKILL.md
  - skills/fork/SKILL.md

skills:
  spawn:
    type: controller
    path: skills/spawn/SKILL.md
    spawnable_by: [user]
    can_spawn: []
    description: "新規セッション spawn（コンテキスト非継承、--worktree 対応）"

  observe:
    type: controller
    path: skills/observe/SKILL.md
    spawnable_by: [user]
    can_spawn: []
    description: "tmux ウィンドウ/ペイン観察・AI 要約"

  fork:
    type: controller
    path: skills/fork/SKILL.md
    spawnable_by: [user]
    can_spawn: []
    description: "セッション fork（コンテキスト継承）"

scripts:
  session-state:
    type: script
    path: scripts/session-state.sh
    description: "セッション状態検出ライブラリ（state/list/wait）"

  session-comm:
    type: script
    path: scripts/session-comm.sh
    description: "セッション間通信プリミティブ（capture/inject/wait-ready/session_msg Strategy dispatch）"

  session-comm-backend-tmux:
    type: script
    path: scripts/session-comm-backend-tmux.sh
    description: "session_msg tmux backend — _backend_tmux_send（ADR-029 Decision 5 Phase 1）"

  session-comm-backend-mcp:
    type: script
    path: scripts/session-comm-backend-mcp.sh
    description: "session_msg MCP mailbox backend — _backend_mcp_send / _backend_shadow_send（ADR-029 Decision 5 Phase 2+）"

  cld:
    type: script
    path: scripts/cld
    description: "Claude Code ランチャー（plugin 自動検出 + systemd-run）。--observer フラグ: .supervisor/session.json の claude_session_id で claude --resume を実行"

  cld-spawn:
    type: script
    path: scripts/cld-spawn
    description: "新規セッション起動（tmux new-window）"

  cld-observe:
    type: script
    path: scripts/cld-observe
    description: "ペイン出力キャプチャ・メタデータ付き出力"

  cld-fork:
    type: script
    path: scripts/cld-fork
    description: "セッション fork 起動（--continue --fork-session）"

  cld-observe-any:
    type: script
    path: scripts/cld-observe-any
    description: "汎用 session-watch ツール（多指標 AND 条件: LLM indicator/log mtime/pane state/budget でイベント発火）"

  cld-observe-loop:
    type: script
    path: scripts/cld-observe-loop
    description: "定期監視ループ（cld-observe-any の thin wrapper。--pattern 'ap-*' デフォルト、既存 API を維持）"

  cld-observe-any-launcher:
    type: script
    path: scripts/cld-observe-any-launcher
    description: "option B flock+nohup daemon 自律再起動管理（ADR-031: SessionStart hook 経由で cld-observe-any を自動再起動）"

  claude-session-save:
    type: script
    path: scripts/claude-session-save.sh
    description: "session_id ↔ tmux ペイン マッピング保存（SessionStart hook）"

  session-name:
    type: script
    path: scripts/session-name.sh
    description: "意味論的 tmux window 命名ヘルパー（generate_window_name / slugify / find_existing_window）"

  window-manifest:
    type: script
    path: scripts/window-manifest.sh
    description: "window manifest atomic write ライブラリ（append/tombstone/schema_version 検証）"

tests:
  session-comm-test:
    type: test
    path: tests/session-comm.test.sh
    description: "session-comm.sh inject-file submit fix の検証（#202）"

  session-name-test:
    type: test
    path: ../twl/tests/bats/scripts/session-name.bats
    description: "session-name.sh の unit tests（slugify / generate_window_name / find_existing_window）"

  window-manifest-test:
    type: test
    path: tests/window-manifest.bats
    description: "window-manifest.sh の bats unit tests（atomic write / tombstone / schema_version 検証）"

  cld-observe-any-test:
    type: test
    path: tests/cld-observe-any.bats
    description: "cld-observe-any の bats unit tests（多指標 AND 判定: LLM indicator false positive / MENU-READY / PANE-DEAD / BUDGET-LOW / PHASE-COMPLETE cmd-echo / event-dir スキーマ確認 / PERMISSION-PROMPT 4 ケース）"

  session-comm-script-dir-validate-test:
    type: test
    path: tests/session-comm-script-dir-validate.bats
    description: "session-comm.sh SCRIPT_DIR 上書きリスク対策の検証（#1048: _TEST_MODE+SESSION_COMM_SCRIPT_DIR の二段検証 / session-state.sh 存在確認）"

  session-comm-usage-typo-1066-test:
    type: test
    path: tests/session-comm-usage-typo-1066.bats
    description: "session-comm.sh ファイルヘッダ usage の inject-file 行に --wait SECONDS 重複がないことを検証（#1066）"

  session-comm-lock-dir-validation-test:
    type: test
    path: tests/session-comm-lock-dir-validation.bats
    description: "SESSION_COMM_LOCK_DIR 不在時の mkdir-p 自動作成・作成不可時の明示エラー検証（#1051）"

  lib-tmux-resolve-test:
    type: test
    path: tests/lib-tmux-resolve.bats
    description: "_resolve_window_target と _kill_window_safe の RED テスト（Issue #1142: AC-4）"

  path-validate-test:
    type: test
    path: tests/path-validate.bats
    description: "validate_supervisor_dir() の unit tests（Issue #1165: SUPERVISOR_DIR パストラバーサル防御）"

  cld-observe-any-self-supervision-test:
    type: test
    path: tests/bats/scripts/cld-observe-any-self-supervision.bats
    description: "cld-observe-any-launcher の self-supervision bats tests（Issue #1146 + #1165）"

  cld-observe-any-test-mode-validate-test:
    type: test
    path: tests/cld-observe-any-test-mode-validate.bats
    description: "cld-observe-any _TEST_MODE flock/validation 設計改善の regression guard（Issue #1166: AC1-AC4）"

  test-1167-ac-verify:
    type: test
    path: tests/test_1167_ac_verify.bats
    description: "Issue #1167/#1197: cld-observe-any.bats _mock_session_state 削除完了の回帰ガード（AC1-AC5）"

  test-1197-ac-verify:
    type: test
    path: tests/test_ac1197_mock_intercept.bats
    description: "Issue #1197: run_observe_once dead mock 削除の regression guard（AC1-AC4）"

  issue-1032-session-comm-strategy-test:
    type: test
    path: tests/issue-1032-session-comm-strategy.bats
    description: "Issue #1032: session-comm Strategy pattern bats tests（AC1-AC9）"
