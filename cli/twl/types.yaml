# TWiLL Type Rules - SSOT (Single Source of Truth)
# 型ルール定義。twl-engine.py はこのファイルから TYPE_RULES を構築する。
# dev:ref-types ドキュメントとの整合性は `twl sync-check --ref <path>` で検証可能。

types:
  controller:
    section: skills
    can_spawn: [workflow, atomic, composite, specialist, reference, script, controller]
    spawnable_by: [user, launcher, supervisor]
    token_target:
      warning: 1500
      critical: 2500

  workflow:
    section: skills
    can_spawn: [atomic, composite, specialist, script]
    spawnable_by: [controller, user]
    token_target:
      warning: 1200
      critical: 2000

  atomic:
    section: commands
    can_spawn: [reference, script, atomic]
    spawnable_by: [workflow, controller, supervisor, user, atomic]
    token_target:
      warning: 1500
      critical: 2500

  composite:
    section: commands
    can_spawn: [specialist, script, reference]
    spawnable_by: [workflow, controller]
    token_target:
      warning: 1500
      critical: 2500

  specialist:
    section: agents
    can_spawn: []
    spawnable_by: [workflow, composite, controller, supervisor]
    token_target:
      warning: 1800
      critical: 2500

  reference:
    section: skills
    can_spawn: []
    spawnable_by: [controller, atomic, composite, workflow, supervisor, agents.skills, all]
    # token_target なし（意図的除外）

  script:
    section: scripts
    can_spawn: [script]
    spawnable_by: [atomic, composite, script, controller, workflow, supervisor]
    # token_target なし（意図的除外）
    # supervisor を spawnable_by に追加（Phase A 2026-04-21）: su-observer が specialist-audit や spawn-controller 等の補助スクリプトを直接呼び出すため

  supervisor:
    section: skills
    can_spawn: [workflow, atomic, composite, specialist, reference, script]
    can_supervise: [controller]
    spawnable_by: [user]
    token_target:
      warning: 2000
      critical: 3000
