# Vale lint config for twill spec content (R-14 / R-15 / R-19 enforce)
# Spec: https://vale.sh/docs

StylesPath = styles
MinAlertLevel = warning

# Vocab dir (allow / reject 用語)、本 task では未使用、将来拡張用
# Vocab = TwillSpec

# === Format-specific rules ===

[*.html]
BasedOnStyles = TwillSpec

[*.md]
BasedOnStyles = TwillSpec

# === Spec content 専用 settings ===

[architecture/spec/*.html]
BasedOnStyles = TwillSpec

# === 除外 (R-14 例外) ===
# changelog.html は history 専用 file
# archive/ / changes/<NNN>/proposal.md は narrative 許容

[architecture/spec/changelog.html]
TwillSpec.PastTense = NO
TwillSpec.DeclarativeOnly = NO

[architecture/archive/**/*.html]
TwillSpec.PastTense = NO
TwillSpec.DeclarativeOnly = NO
TwillSpec.CodeBlock = NO

[architecture/changes/**/*.md]
TwillSpec.PastTense = NO
TwillSpec.DeclarativeOnly = NO

[architecture/decisions/*.md]
TwillSpec.PastTense = NO
TwillSpec.DeclarativeOnly = NO

# === 段階的 enforce ===
# Phase 1: warning mode (本 file の初期設定)
# Phase 2 (安定後): MinAlertLevel = error に切替、CI で merge block
