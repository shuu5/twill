name: Project Status Done

on:
  issues:
    types: [closed]

permissions: {}

env:
  PROJECT_ID: PVT_kwHOCNFEd84BS03g
  STATUS_FIELD_ID: PVTSSF_lAHOCNFEd84BS03gzhAPzog
  DONE_OPTION_ID: "98236657"

jobs:
  set-status-done:
    runs-on: ubuntu-latest
    steps:
      - name: Find project item
        id: find-item
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { id }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="$PROJECT_ID" \
            --jq ".data.node.items.nodes[] | select(.content.id == \"$ISSUE_NODE_ID\") | .id" \
          | head -1)
          echo "item_id=$ITEM_ID" >> "$GITHUB_OUTPUT"

      - name: Update status to Done
        if: steps.find-item.outputs.item_id != ''
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.find-item.outputs.item_id }}
        run: |
          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }
          ' \
            -f projectId="$PROJECT_ID" \
            -f itemId="$ITEM_ID" \
            -f fieldId="$STATUS_FIELD_ID" \
            -f optionId="$DONE_OPTION_ID"
