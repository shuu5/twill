name: spec-link-check

on:
  pull_request:
    paths:
      - 'architecture/spec/**'
      - 'architecture/changes/**'
      - 'architecture/archive/**'
      - 'architecture/steering/**'
      - 'architecture/decisions/**'
      - 'scripts/spec-anchor-link-check.py'
      - '.github/workflows/spec-link-check.yml'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run spec-anchor-link-check (broken + orphan, JSON mode)
        id: link-check
        run: |
          set -o pipefail
          python3 scripts/spec-anchor-link-check.py --check-orphan --output json | tee link-check.json
          BROKEN=$(jq '.broken_count' link-check.json)
          ORPHAN=$(jq '.orphan_count' link-check.json)
          if [ -z "$BROKEN" ] || [ -z "$ORPHAN" ] || [ "$BROKEN" = "null" ] || [ "$ORPHAN" = "null" ]; then
            echo "::error::Could not parse broken/orphan count from link-check JSON output"
            exit 2
          fi
          echo "broken_count=$BROKEN" >> "$GITHUB_OUTPUT"
          echo "orphan_count=$ORPHAN" >> "$GITHUB_OUTPUT"
          if [ "$BROKEN" -gt 0 ] || [ "$ORPHAN" -gt 0 ]; then
            echo "::error::Found $BROKEN broken / $ORPHAN orphan link(s) in architecture/spec/. Fix before merge."
            jq -r '.broken[]? | "  broken: " + .source_file + ":" + (.line|tostring) + " -> " + .href' link-check.json || true
            jq -r '.orphans[]? | "  orphan: " + .' link-check.json || true
            exit 1
          fi
          echo "All spec links OK (broken: 0, orphan: 0)"

      - name: Upload link-check artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-link-check-result
          path: link-check.json
          retention-days: 14
